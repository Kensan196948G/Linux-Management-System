<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Jobs - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="../vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Cronジョブテーブル専用スタイル */
        .cron-table {
            width: 100%;
            font-size: 14px;
        }

        .cron-table th {
            background-color: #2c3e50;
            color: white;
            padding: 10px 8px;
            font-weight: bold;
            border-bottom: 2px solid #34495e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .cron-table td {
            padding: 8px;
            border-bottom: 1px solid #ecf0f1;
            vertical-align: middle;
        }

        .cron-table tr:hover {
            background-color: #f8f9fa;
        }

        /* コントロールバー */
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
        }

        .control-group select,
        .control-group input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        /* スケジュールプレビュー */
        .schedule-preview {
            font-size: 13px;
            padding: 8px 12px;
            background-color: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 4px;
            margin-top: 4px;
        }

        /* Cron式内訳グリッド */
        .cron-breakdown {
            display: inline-grid;
            grid-template-columns: repeat(5, auto);
            gap: 2px 6px;
            font-size: 10px;
            margin-top: 3px;
        }
        .cron-field-label { color: #6b7280; text-align: center; }
        .cron-field-value { background: #e0f2fe; color: #0369a1; border-radius: 3px;
                            padding: 1px 5px; text-align: center; font-weight: 600;
                            font-family: monospace; font-size: 11px; }

        /* 危険コマンドバッジ */
        .danger-badge {
            display: inline-block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 4px;
            font-size: 11px;
            padding: 1px 6px;
            margin-left: 4px;
            font-weight: 600;
        }

        /* ステータスバッジ */
        .badge-enabled { background-color: #10b981; }
        .badge-disabled { background-color: #6b7280; }

        /* 統計カード */
        .stats-card {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .stat-item {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 左側サイドバー -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <div class="main-header">
                <h2 id="page-title">📅 Cronジョブ管理</h2>
            </div>

            <div class="main-body" id="main-body">
                <!-- アラートコンテナ -->
                <div id="cronAlertContainer"></div>

                <!-- コントロールバー -->
                <div class="controls-bar">
                    <div class="control-group">
                        <label for="cronUserSelect">対象ユーザー</label>
                        <select id="cronUserSelect" class="form-select form-select-sm" style="min-width: 200px;">
                            <option value="">ユーザーを選択...</option>
                        </select>
                    </div>

                    <div class="control-group" style="margin-left: auto;">
                        <label>&nbsp;</label>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-sm btn-primary" id="addCronJobBtn" style="display: none;" disabled>
                                <i class="bi bi-plus-circle"></i> ジョブ追加
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
                                <i class="bi bi-arrow-clockwise"></i> 更新
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="autoRefreshBtn" title="自動更新: OFF">
                                <i class="bi bi-clock"></i> 自動更新
                            </button>
                        </div>
                    </div>
                </div>

                <!-- cron式バリデーター -->
                <div class="card mb-3">
                    <div class="card-header py-2 d-flex align-items-center gap-2"
                         style="background:#f1f5f9; cursor:pointer;"
                         data-bs-toggle="collapse" data-bs-target="#cronValidatorBody">
                        <i class="bi bi-check2-circle text-primary"></i>
                        <strong>cron式バリデーター</strong>
                        <span class="ms-1 text-muted small">（入力しながらリアルタイム検証）</span>
                        <i class="bi bi-chevron-down ms-auto"></i>
                    </div>
                    <div class="collapse show" id="cronValidatorBody">
                        <div class="card-body">
                            <div class="row g-2 align-items-center">
                                <div class="col-12 col-md-6">
                                    <label for="cronValidatorInput" class="form-label mb-1 small fw-semibold">cron式（5フィールド）</label>
                                    <input type="text" class="form-control font-monospace" id="cronValidatorInput"
                                           placeholder="例: */5 * * * *">
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label mb-1 small fw-semibold">検証結果</label>
                                    <div id="cronValidatorResult" class="schedule-preview text-muted">
                                        cron式を入力してください
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ステータス表示 -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span id="cronStatusText" class="text-muted small"></span>
                    <span id="cronLoadingSpinner" style="display: none;">
                        <span class="spinner-border spinner-border-sm"></span> 読み込み中...
                    </span>
                </div>

                <!-- Cronジョブテーブル -->
                <div class="table-responsive">
                    <table class="table table-sm table-hover cron-table">
                        <thead>
                            <tr>
                                <th>状態</th>
                                <th>スケジュール</th>
                                <th>コマンド</th>
                                <th>引数</th>
                                <th>コメント</th>
                                <th>次回実行予定</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="cronJobsTableBody">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-4">
                                    ユーザーを選択してください
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ジョブ追加モーダル -->
    <div class="modal fade" id="addCronJobModal" tabindex="-1" aria-labelledby="addCronJobModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addCronJobModalLabel">Cronジョブ追加</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addCronJobForm">
                    <div class="modal-body">
                        <div id="addJobModalAlert"></div>

                        <div class="mb-3">
                            <label class="form-label">対象ユーザー</label>
                            <div class="form-control-plaintext">
                                <strong id="addJobTargetUser">-</strong>
                                <span class="ms-2" id="addJobRemaining"></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="schedulePreset" class="form-label">スケジュールプリセット</label>
                            <select class="form-select" id="schedulePreset">
                                <option value="">プリセットを選択...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="cronSchedule" class="form-label">スケジュール（Cron式）</label>
                            <input type="text" class="form-control font-monospace" id="cronSchedule" required
                                placeholder="分 時 日 月 曜日  (例: 0 2 * * *)">
                            <div id="schedulePreview" class="form-text"></div>
                            <div class="form-text text-muted">*/1 ~ */4 は禁止（最低 */5 分間隔）</div>
                        </div>

                        <div class="mb-3">
                            <label for="cronCommand" class="form-label">コマンド（Allowlist）</label>
                            <select class="form-select" id="cronCommand" required>
                                <option value="">コマンドを選択...</option>
                            </select>
                            <div class="form-text text-muted">セキュリティのため、許可されたコマンドのみ選択可能です</div>
                        </div>

                        <div class="mb-3">
                            <label for="cronArguments" class="form-label">引数（オプション）</label>
                            <input type="text" class="form-control font-monospace" id="cronArguments"
                                maxlength="512" placeholder="例: -avz /data /backup/data">
                            <div class="form-text text-muted">禁止文字: ; | & $ ( ) ` { } [ ] および .. (パストラバーサル)</div>
                        </div>

                        <div class="mb-3">
                            <label for="cronComment" class="form-label">コメント（オプション）</label>
                            <input type="text" class="form-control" id="cronComment"
                                maxlength="256" placeholder="例: Daily data backup">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="submit" class="btn btn-primary" id="submitAddCronJob">追加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="../js/env-config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar.js"></script>
<script>document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>renderSidebar('cron')):renderSidebar('cron');</script>
    <script src="../js/cron.js"></script>
    <script>
        // ログアウト関数
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = window.location.pathname.replace(/[^/]*$/, '') + 'index.html';
        }

        // cron式バリデーター（リアルタイム）
        (function () {
            const input = document.getElementById('cronValidatorInput');
            const result = document.getElementById('cronValidatorResult');
            let debounceTimer = null;

            if (!input || !result) return;

            input.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                const expr = input.value.trim();
                if (!expr) {
                    result.className = 'schedule-preview text-muted';
                    result.textContent = 'cron式を入力してください';
                    return;
                }
                result.className = 'schedule-preview text-muted';
                result.textContent = '検証中...';
                debounceTimer = setTimeout(() => validateExpression(expr), 400);
            });

            async function validateExpression(expr) {
                const token = localStorage.getItem('access_token');
                const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
                const BASE_URL = (window.ENV_CONFIG && window.ENV_CONFIG.API_BASE_URL) || '';
                try {
                    const url = BASE_URL + '/api/cron/validate?expression=' + encodeURIComponent(expr);
                    const res = await fetch(url, { headers });
                    if (res.status === 400) {
                        result.className = 'schedule-preview text-danger border-danger bg-danger bg-opacity-10';
                        result.innerHTML = '<i class="bi bi-x-circle"></i> 禁止文字が含まれています';
                        return;
                    }
                    if (res.status === 401 || res.status === 403) {
                        result.className = 'schedule-preview text-warning';
                        result.innerHTML = '<i class="bi bi-lock"></i> 認証が必要です';
                        return;
                    }
                    const data = await res.json();
                    if (data.valid) {
                        result.className = 'schedule-preview text-success border-success bg-success bg-opacity-10';
                        result.innerHTML = '<i class="bi bi-check-circle"></i> <strong>' + escapeHtmlLocal(data.description) + '</strong>';
                    } else {
                        result.className = 'schedule-preview text-danger border-danger bg-danger bg-opacity-10';
                        result.innerHTML = '<i class="bi bi-x-circle"></i> ' + escapeHtmlLocal(data.description);
                    }
                } catch (e) {
                    result.className = 'schedule-preview text-muted';
                    result.textContent = 'エラー: ' + (e.message || '通信失敗');
                }
            }

            function escapeHtmlLocal(str) {
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }
        })();
    </script>
</body>
</html>
