<script>
// ── 定数 ────────────────────────────────────────────────
var MAX_POINTS = 60;

// ── ラベル生成ヘルパー ───────────────────────────────────
function makeLabels() {
    var labels = [];
    for (var i = MAX_POINTS; i >= 1; i--) { labels.push('-' + i + 's'); }
    return labels;
}
function makeZeros() {
    var a = [];
    for (var i = 0; i < MAX_POINTS; i++) a.push(0);
    return a;
}
function pushPoint(arr, val) {
    arr.push(val);
    if (arr.length > MAX_POINTS) arr.shift();
}

// ── Chart.js インスタンス ────────────────────────────────
var cpuRingChart, cpuLineChart, memBarChart, netLineChart;
var cpuHistory = makeZeros();
var netInHistory = makeZeros();
var netOutHistory = makeZeros();

function initCharts() {
    // CPU リング
    cpuRingChart = new Chart(document.getElementById('cpuRing'), {
        type: 'doughnut',
        data: {
            datasets: [{ data: [0, 100], backgroundColor: ['#3b82f6', '#e5e7eb'], borderWidth: 0 }]
        },
        options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 300 } }
    });

    // CPU 折れ線
    cpuLineChart = new Chart(document.getElementById('cpuLine'), {
        type: 'line',
        data: {
            labels: makeLabels(),
            datasets: [{ label: 'CPU%', data: cpuHistory.slice(), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, pointRadius: 0 }]
        },
        options: { scales: { y: { min: 0, max: 100 } }, plugins: { legend: { display: false } }, animation: { duration: 200 } }
    });

    // メモリ バー
    memBarChart = new Chart(document.getElementById('memBar'), {
        type: 'bar',
        data: {
            labels: ['使用中', '空き'],
            datasets: [{ data: [0, 100], backgroundColor: ['#f59e0b', '#e5e7eb'] }]
        },
        options: { indexAxis: 'y', scales: { x: { min: 0, max: 100 } }, plugins: { legend: { display: false } }, animation: { duration: 300 } }
    });

    // ネットワーク 折れ線
    netLineChart = new Chart(document.getElementById('netLine'), {
        type: 'line',
        data: {
            labels: makeLabels(),
            datasets: [
                { label: 'IN', data: netInHistory.slice(), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
                { label: 'OUT', data: netOutHistory.slice(), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3, pointRadius: 0 }
            ]
        },
        options: { scales: { y: { min: 0 } }, plugins: { legend: { display: true } }, animation: { duration: 200 } }
    });
}

// ── チャート更新 ─────────────────────────────────────────
function updateCharts(cpu, mem, netIn, netOut) {
    // CPU リング
    cpuRingChart.data.datasets[0].data = [cpu, Math.max(0, 100 - cpu)];
    cpuRingChart.update();
    document.getElementById('cpuValue').textContent = cpu.toFixed(1) + '%';

    // CPU 折れ線
    pushPoint(cpuHistory, cpu);
    cpuLineChart.data.datasets[0].data = cpuHistory.slice();
    cpuLineChart.update();

    // メモリ バー
    memBarChart.data.datasets[0].data = [mem, Math.max(0, 100 - mem)];
    memBarChart.update();

    // ネットワーク
    pushPoint(netInHistory, netIn);
    pushPoint(netOutHistory, netOut);
    netLineChart.data.datasets[0].data = netInHistory.slice();
    netLineChart.data.datasets[1].data = netOutHistory.slice();
    netLineChart.update();
}

// ── SSE ─────────────────────────────────────────────────
var sseConn = null;
var sseRetryTimer = null;

function setSseBadge(state) {
    var badge = document.getElementById('sse-status');
    var text = document.getElementById('sse-status-text');
    badge.className = 'sse-badge sse-' + state;
    text.textContent = state === 'connected' ? 'Live' : state === 'connecting' ? '接続中...' : '未接続';
}

function connectSSE() {
    var token = localStorage.getItem('access_token');
    if (!token) return;
    if (sseConn) { sseConn.close(); sseConn = null; }
    if (sseRetryTimer) { clearTimeout(sseRetryTimer); sseRetryTimer = null; }
    setSseBadge('connecting');

    var url = window.location.origin + '/api/stream/dashboard?token=' + encodeURIComponent(token);
    sseConn = new EventSource(url);

    sseConn.onopen = function() { setSseBadge('connected'); };

    sseConn.onmessage = function(e) {
        try {
            var d = JSON.parse(e.data);
            updateCharts(d.cpu || 0, d.mem || 0, d.net_in || 0, d.net_out || 0);
            document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('ja-JP');
            setSseBadge('connected');
        } catch(err) { console.error('SSE parse error', err); }
    };

    sseConn.onerror = function() {
        setSseBadge('disconnected');
        if (sseConn) { sseConn.close(); sseConn = null; }
        sseRetryTimer = setTimeout(connectSSE, 5000);
    };
}

window.addEventListener('beforeunload', function() {
    if (sseConn) sseConn.close();
    disconnectWebSocket();
});

// ── WebSocket リアルタイム監視 ────────────────────────────
var wsConn = null;
var wsRetryTimer = null;
var wsEnabled = false;

function setWsBadge(state) {
    var badge = document.getElementById('ws-status');
    var text = document.getElementById('ws-status-text');
    var btn = document.getElementById('ws-toggle-btn');
    if (!badge || !text) return;
    badge.className = 'ws-badge ws-' + state;
    var labels = { connected: 'WS接続中', connecting: 'WS接続中...', disconnected: 'WS切断', error: 'WSエラー' };
    text.textContent = labels[state] || state;
    if (btn) btn.textContent = (state === 'connected' || state === 'connecting') ? 'WS切断' : 'WS接続';
}

function connectWebSocket() {
    var token = localStorage.getItem('access_token');
    if (!token) return;
    if (wsConn) { wsConn.close(); wsConn = null; }
    if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }
    wsEnabled = true;
    setWsBadge('connecting');
    var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = proto + '//' + window.location.host + '/api/ws/system';
    try {
        wsConn = new WebSocket(wsUrl);
    } catch (e) {
        setWsBadge('error');
        return;
    }
    wsConn.onopen = function() {
        wsConn.send(JSON.stringify({ type: 'auth', token: token }));
        setWsBadge('connected');
    };
    wsConn.onmessage = function(e) {
        try {
            var msg = JSON.parse(e.data);
            if (msg.type === 'system_update' && msg.data) {
                var d = msg.data;
                updateCharts(d.cpu_percent || 0, d.memory_percent || 0, 0, 0);
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('ja-JP');
                setWsBadge('connected');
            }
        } catch (err) { console.error('WS parse error', err); }
    };
    wsConn.onerror = function() { setWsBadge('error'); };
    wsConn.onclose = function(ev) {
        wsConn = null;
        if (wsEnabled) {
            setWsBadge('disconnected');
            // SSE にフォールバック
            connectSSE();
        }
    };
}

function disconnectWebSocket() {
    wsEnabled = false;
    if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }
    if (wsConn) { wsConn.close(); wsConn = null; }
    setWsBadge('disconnected');
}

function toggleWebSocket() {
    if (wsEnabled && wsConn && wsConn.readyState === WebSocket.OPEN) {
        disconnectWebSocket();
    } else {
        // SSE を停止して WebSocket を起動
        if (sseConn) { sseConn.close(); sseConn = null; }
        if (sseRetryTimer) { clearTimeout(sseRetryTimer); sseRetryTimer = null; }
        setSseBadge('disconnected');
        connectWebSocket();
    }
}

// ── 起動 ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    var token = localStorage.getItem('access_token');
    if (!token) { window.location.href = 'index.html'; return; }
    if (typeof api !== 'undefined') api.setToken(token);
    initCharts();
    connectSSE();
    loadRecentErrorsWidget();
    setInterval(loadRecentErrorsWidget, 60000);
    loadNicStats();
    setInterval(loadNicStats, 30000);
    loadHealthScore();
    setInterval(loadHealthScore, 30000);
});

// ── 直近エラーウィジェット ────────────────────────────────
function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadRecentErrorsWidget() {
    var token = localStorage.getItem('access_token');
    if (!token) return;
    try {
        var resp = await fetch('/api/logsearch/recent-errors', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) return;
        var data = await resp.json();
        var errors = data.errors || data.lines || [];
        var badge = document.getElementById('error-count-badge');
        var area = document.getElementById('error-log-area');
        var timeEl = document.getElementById('error-update-time');
        if (badge) badge.textContent = errors.length + '件';
        if (timeEl) timeEl.textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP');
        if (area) {
            if (errors.length === 0) {
                area.innerHTML = '<span style="color:#6b7280">エラーログなし</span>';
            } else {
                area.innerHTML = errors.slice(0, 20).map(function(l) {
                    return '<span style="color:' + (/error|critical|fatal/i.test(l) ? '#f38ba8' : '#cdd6f4') + '">' + escapeHtml(l) + '</span>';
                }).join('\n');
                area.scrollTop = area.scrollHeight;
            }
        }
    } catch(e) {}
}

// ── NIC統計ウィジェット ─────────────────────────────────
function formatBytes(b) {
    b = Number(b);
    if (b > 1073741824) return (b / 1073741824).toFixed(1) + 'GB';
    if (b > 1048576)    return (b / 1048576).toFixed(1) + 'MB';
    if (b > 1024)       return (b / 1024).toFixed(1) + 'KB';
    return b + 'B';
}

async function loadNicStats() {
    var token = localStorage.getItem('access_token');
    if (!token) return;
    try {
        var resp = await fetch('/api/system/detailed', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) return;
        var data = await resp.json();
        var nics = (data.data || {}).network_interfaces || [];
        var el = document.getElementById('nic-stats-area');
        var timeEl = document.getElementById('nic-update-time');
        if (timeEl) timeEl.textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP');
        if (!el) return;
        if (!nics.length || nics[0].error) {
            el.innerHTML = '<span style="color:#6b7280">NICデータなし</span>';
            return;
        }
        el.innerHTML = nics.map(function(n) {
            return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-color,#e2e8f0)">' +
                '<span style="font-weight:500">' + escapeHtml(n.interface) + '</span>' +
                '<span style="font-size:11px;color:var(--text-secondary,#64748b)">' +
                    '↑' + formatBytes(n.tx_bytes) + ' ↓' + formatBytes(n.rx_bytes) +
                    (n.rx_errors || n.tx_errors ? ' <span style="color:#ef4444">err:' + (n.rx_errors + n.tx_errors) + '</span>' : '') +
                '</span>' +
            '</div>';
        }).join('');
    } catch(e) {}
}

// ── システムヘルススコアウィジェット ─────────────────────
async function loadHealthScore() {
    var token = localStorage.getItem('access_token');
    if (!token) return;
    try {
        var resp = await fetch((window.API_BASE_URL || '') + '/api/system/health-score', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) return;
        var d = await resp.json();
        var score = d.score;
        var numEl = document.getElementById('health-score-num');
        var badgeEl = document.getElementById('health-status-badge');
        var updEl = document.getElementById('health-updated');
        var compsEl = document.getElementById('health-components');

        // スコア色分け
        var color = score >= 90 ? '#059669' : score >= 70 ? '#3b82f6' : score >= 50 ? '#f59e0b' : '#dc2626';
        numEl.style.color = color;
        numEl.textContent = score;

        // ステータスバッジ
        var statusLabels = { excellent: '✅ 優秀', good: '✔ 良好', warning: '⚠ 注意', critical: '🔴 危険' };
        var statusColors = { excellent: '#d1fae5:#065f46', good: '#dbeafe:#1e40af', warning: '#fef3c7:#92400e', critical: '#fee2e2:#991b1b' };
        var sc = statusColors[d.status] ? statusColors[d.status].split(':') : ['#f3f4f6', '#6b7280'];
        badgeEl.style.background = sc[0]; badgeEl.style.color = sc[1];
        badgeEl.textContent = statusLabels[d.status] || d.status;

        // コンポーネントバー
        var compNames = { cpu: 'CPU', memory: 'メモリ', disk: 'ディスク', alerts: 'アラート', services: 'サービス' };
        var html = '';
        Object.keys(d.components).forEach(function(k) {
            var c = d.components[k];
            var barColor = c.score >= 90 ? '#059669' : c.score >= 70 ? '#3b82f6' : c.score >= 50 ? '#f59e0b' : '#dc2626';
            var valStr = (k === 'alerts' || k === 'services') ? c.value + '件' : c.value + '%';
            html += '<div class="health-component">' +
                '<div class="health-comp-label"><span>' + (compNames[k] || k) + '</span><span style="color:' + barColor + '">' + valStr + '</span></div>' +
                '<div class="health-comp-bar-bg"><div class="health-comp-bar" style="width:' + c.score + '%;background:' + barColor + '"></div></div>' +
                '</div>';
        });
        compsEl.innerHTML = html;

        if (updEl && d.generated_at) updEl.textContent = '更新: ' + d.generated_at.slice(11, 19) + ' UTC';
    } catch(e) {}
}

// ── ダッシュボードドラッグ&ドロップ ─────────────────────────
var WIDGET_ORDER_KEY = 'lms_dashboard_widget_order';

function initDragDrop() {
    var grid = document.getElementById('widgets-grid');
    if (!grid || typeof Sortable === 'undefined') return;

    // 保存済みの順序を復元
    restoreWidgetOrder();

    Sortable.create(grid, {
        handle: '.drag-handle',
        animation: 200,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: function() {
            saveWidgetOrder();
        }
    });
}

function saveWidgetOrder() {
    var grid = document.getElementById('widgets-grid');
    if (!grid) return;
    var ids = Array.from(grid.children).map(function(el) {
        return el.getAttribute('data-widget-id') || '';
    }).filter(Boolean);
    localStorage.setItem(WIDGET_ORDER_KEY, JSON.stringify(ids));
}

function restoreWidgetOrder() {
    var stored = localStorage.getItem(WIDGET_ORDER_KEY);
    if (!stored) return;
    try {
        var order = JSON.parse(stored);
        var grid = document.getElementById('widgets-grid');
        if (!grid) return;
        order.forEach(function(id) {
            var el = grid.querySelector('[data-widget-id="' + id + '"]');
            if (el) grid.appendChild(el);
        });
    } catch(e) {}
}

function resetWidgetLayout() {
    localStorage.removeItem(WIDGET_ORDER_KEY);
    location.reload();
}

// DOMContentLoaded後にドラッグ&ドロップ初期化
document.addEventListener('DOMContentLoaded', function() {
    // SortableJSが確実に読み込まれた後に初期化
    if (typeof Sortable !== 'undefined') {
        initDragDrop();
    } else {
        // fallback: 少し待ってリトライ
        setTimeout(initDragDrop, 500);
    }
});
</script>
