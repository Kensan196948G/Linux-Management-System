    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Search - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        .log-area { background: #1e1e2e; color: #cdd6f4; font-family: monospace; font-size: 12px; padding: 14px; border-radius: 8px; height: 450px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .log-line { line-height: 1.7; display: block; }
        .log-line.error { color: #f38ba8; }
        .highlight { background: #f6c90e; color: #000; border-radius: 2px; padding: 0 2px; }
        .stat-badge { background: #e0e7ff; color: #3730a3; border-radius: 12px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-left: 8px; }
        .tab-btn { padding: 6px 18px; border-radius: 20px; border: 1.5px solid #d1d5db; background: #fff; color: #374151; font-size: 13px; cursor: pointer; transition: all 0.15s; margin-right: 6px; margin-bottom: 6px; }
        .tab-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
        .tab-btn:hover:not(.active) { background: #f3f4f6; border-color: #9ca3af; }
        .error-log-area { background: #2d1b1b; color: #f38ba8; }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">
        <div class="main-header">
            <h2 id="page-title">🔍 Log Search <small class="text-muted fs-6">ログ検索</small></h2>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadFileList()">🔄 リフレッシュ</button>
        </div>

        <div class="main-body">
            <div id="alert-area"></div>

            <!-- タブ -->
            <div class="mb-3">
                <button class="tab-btn active" onclick="showTab('search')" id="tab-search">🔍 検索</button>
                <button class="tab-btn" onclick="showTab('errors')" id="tab-errors">🔴 直近エラー</button>
                <button class="tab-btn" onclick="showTab('stream')" id="tab-stream">📡 リアルタイム</button>
            </div>

            <!-- 検索タブ -->
            <div id="pane-search">
                <!-- ログファイル選択パネル -->
                <div class="card mb-3">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span>📁 ログファイル選択</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="loadFileList()">🔄 リフレッシュ</button>
                    </div>
                    <div class="card-body py-2">
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <label for="file-select" class="form-label mb-0">ファイル:</label>
                            <select id="file-select" class="form-select form-select-sm" style="max-width:280px">
                                <option value="syslog">syslog</option>
                            </select>
                            <span id="file-count" class="stat-badge">-</span>
                        </div>
                    </div>
                </div>

                <!-- 検索フォーム -->
                <div class="card mb-3">
                    <div class="card-header">🔍 検索フォーム</div>
                    <div class="card-body">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-5">
                                <label for="keyword-input" class="form-label form-label-sm mb-1">検索キーワード</label>
                                <input type="text" id="keyword-input" class="form-control form-control-sm"
                                    placeholder="例: error, Failed, nginx"
                                    onkeydown="if(event.key==='Enter') searchLogs()">
                            </div>
                            <div class="col-md-3">
                                <label for="logfile-select" class="form-label form-label-sm mb-1">ログファイル</label>
                                <select id="logfile-select" class="form-select form-select-sm">
                                    <option value="syslog">syslog</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label for="lines-select" class="form-label form-label-sm mb-1">表示行数</label>
                                <select id="lines-select" class="form-select form-select-sm">
                                    <option value="30">30行</option>
                                    <option value="50" selected>50行</option>
                                    <option value="100">100行</option>
                                    <option value="200">200行</option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex gap-2 flex-wrap">
                                <button class="btn btn-primary btn-sm" onclick="searchLogs()">🔍 検索</button>
                                <button class="btn btn-outline-secondary btn-sm" onclick="clearSearch()">✕ クリア</button>
                                <button class="btn btn-outline-warning btn-sm"
                                    onclick="saveQuery(document.getElementById('keyword-input').value, document.getElementById('logfile-select').value || 'syslog')">⭐ 保存</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 保存済みクエリ -->
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>⭐ 保存済みクエリ</span>
                        <span class="stat-badge" id="saved-count">0</span>
                    </div>
                    <div class="card-body">
                        <div id="saved-queries-list">
                            <p class="text-muted small mb-0">保存済みクエリはありません</p>
                        </div>
                    </div>
                </div>

                <!-- 検索結果 -->
                <div class="card">
                    <div class="card-header d-flex align-items-center">
                        <span>📄 検索結果</span>
                        <span id="search-count" class="stat-badge">-</span>
                    </div>
                    <div class="card-body p-2">
                        <div class="log-area" id="log-search">
                            <span class="text-muted" style="color:#6b7280;">キーワードを入力して検索してください</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 直近エラータブ -->
            <div id="pane-errors" style="display:none">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <span>🔴 直近エラー</span>
                            <span id="error-count" class="stat-badge">-</span>
                        </div>
                        <button class="btn btn-sm btn-outline-danger" onclick="loadRecentErrors()">🔄 更新</button>
                    </div>
                    <div class="card-body p-2">
                        <div class="log-area error-log-area" id="log-errors">読み込み中...</div>
                    </div>
                </div>
            </div>

            <!-- リアルタイムストリームタブ -->
            <div id="pane-stream" style="display:none">
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>📡 リアルタイムログストリーム</span>
                        <div class="d-flex gap-2 align-items-center">
                            <select id="stream-file-select" class="form-select form-select-sm" style="width:auto">
                                <option value="syslog">syslog</option>
                                <option value="auth.log">auth.log</option>
                                <option value="kern.log">kern.log</option>
                                <option value="dpkg.log">dpkg.log</option>
                            </select>
                            <button id="stream-start-btn" class="btn btn-sm btn-success" onclick="startStream()">▶ 開始</button>
                            <button id="stream-stop-btn" class="btn btn-sm btn-danger" onclick="stopStream()" style="display:none">⏹ 停止</button>
                            <span id="stream-status" class="stat-badge">停止中</span>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="stream-log" class="log-area" style="height:500px">
                            <span style="color:#666">▶ 開始ボタンを押すとリアルタイムストリーミングを開始します</span>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body py-2">
                        <small class="text-muted">⚡ tail -f 相当のリアルタイム表示 | 最大500行保持 | 自動スクロール</small>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

    <script src="../js/env-config.js"></script>
    <script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
    <script>document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>renderSidebar('logsearch')):renderSidebar('logsearch');</script>
<script>
    const API_BASE = '/api/logsearch/';

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function showAlert(msg, type = 'danger') {
        document.getElementById('alert-area').innerHTML =
            `<div class="alert alert-${type} alert-dismissible fade show">${escapeHtml(msg)}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    }

    function getToken() {
        return localStorage.getItem('access_token');
    }

    async function apiGet(url) {
        const token = getToken();
        const resp = await fetch(url, {
            headers: token ? { Authorization: `Bearer ${token}` } : {},
        });
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({ detail: resp.statusText }));
            throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        return resp.json();
    }

    function highlightPattern(text, pattern) {
        if (!pattern) return escapeHtml(text);
        try {
            const escaped = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp(`(${escaped})`, 'gi');
            return escapeHtml(text).replace(
                new RegExp(`(${escaped.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')})`, 'gi'),
                '<span class="highlight">$1</span>'
            );
        } catch (e) {
            return escapeHtml(text);
        }
    }

    function renderLogLines(lines, containerId, pattern) {
        const area = document.getElementById(containerId);
        if (!lines || lines.length === 0) {
            area.innerHTML = '<span style="color:#6b7280;">一致する行がありません</span>';
            return;
        }
        area.innerHTML = lines.map(line => {
            const lower = line.toLowerCase();
            const isError = /\berr\b|error|crit|emerg|alert|fail|fatal/.test(lower);
            const cls = 'log-line' + (isError ? ' error' : '');
            const html = pattern ? highlightPattern(line, pattern) : escapeHtml(line);
            return `<span class="${cls}">${html}</span>`;
        }).join('');
        area.scrollTop = area.scrollHeight;
    }

    async function loadFileList() {
        try {
            const data = await apiGet(`${API_BASE}files`);
            const files = data.files || [];
            const selectIds = ['file-select', 'logfile-select'];
            selectIds.forEach(id => {
                const sel = document.getElementById(id);
                const prev = sel.value;
                sel.innerHTML = '';
                files.forEach(f => {
                    const basename = f.split('/').pop();
                    const opt = document.createElement('option');
                    opt.value = basename;
                    opt.textContent = basename;
                    sel.appendChild(opt);
                });
                if (files.some(f => f.split('/').pop() === prev)) sel.value = prev;
                else if (files.some(f => f.split('/').pop() === 'syslog')) sel.value = 'syslog';
            });
            document.getElementById('file-count').textContent = `${files.length} ファイル`;
        } catch (e) {
            showAlert('ファイル一覧の取得に失敗しました: ' + e.message);
        }
    }

    async function searchLogs() {
        const pattern = document.getElementById('keyword-input').value.trim();
        const logfile = document.getElementById('logfile-select').value;
        const lines = document.getElementById('lines-select').value;

        if (!pattern) {
            showAlert('検索キーワードを入力してください', 'warning');
            return;
        }

        const area = document.getElementById('log-search');
        area.innerHTML = '<span style="color:#6b7280;">検索中...</span>';
        document.getElementById('search-count').textContent = '-';

        try {
            const params = new URLSearchParams({ pattern, logfile, lines });
            const data = await apiGet(`${API_BASE}search?${params}`);
            renderLogLines(data.lines || [], 'log-search', pattern);
            document.getElementById('search-count').textContent = `${data.count ?? (data.lines || []).length} 件`;
        } catch (e) {
            area.innerHTML = `<span style="color:#f38ba8;">エラー: ${escapeHtml(e.message)}</span>`;
            showAlert('検索に失敗しました: ' + e.message);
        }
    }

    function clearSearch() {
        document.getElementById('keyword-input').value = '';
        document.getElementById('log-search').innerHTML = '<span style="color:#6b7280;">キーワードを入力して検索してください</span>';
        document.getElementById('search-count').textContent = '-';
    }

    async function loadRecentErrors() {
        const area = document.getElementById('log-errors');
        area.innerHTML = '<span style="color:#f38ba8;">読み込み中...</span>';
        document.getElementById('error-count').textContent = '-';
        try {
            const data = await apiGet(`${API_BASE}recent-errors`);
            renderLogLines(data.lines || [], 'log-errors', null);
            document.getElementById('error-count').textContent = `${data.count ?? (data.lines || []).length} 件`;
        } catch (e) {
            area.innerHTML = `<span style="color:#f38ba8;">エラー: ${escapeHtml(e.message)}</span>`;
            showAlert('直近エラーの取得に失敗しました: ' + e.message);
        }
    }

    let currentTab = 'search';

    function showTab(tab) {
        ['search', 'errors', 'stream'].forEach(t => {
            document.getElementById(`pane-${t}`).style.display = t === tab ? '' : 'none';
            document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
        });
        // ストリームタブ以外に切り替えた場合はストリームを停止
        if (tab !== 'stream') stopStream();
        currentTab = tab;
        if (tab === 'errors') loadRecentErrors();
    }

    // ===== リアルタイムストリーム =====
    let streamEventSource = null;
    let streamLines = [];
    const MAX_STREAM_LINES = 500;

    function startStream() {
        const logfile = document.getElementById('stream-file-select').value;
        const token = getToken();
        if (!token) { showAlert('認証が必要です', 'danger'); return; }

        stopStream(); // 既存ストリームを停止

        const url = `/api/logsearch/stream?logfile=${encodeURIComponent(logfile)}&token=${encodeURIComponent(token)}`;
        streamEventSource = new EventSource(url);

        document.getElementById('stream-start-btn').style.display = 'none';
        document.getElementById('stream-stop-btn').style.display = '';
        document.getElementById('stream-status').textContent = '接続中...';
        document.getElementById('stream-status').style.background = '#fef3c7';
        document.getElementById('stream-status').style.color = '#92400e';
        streamLines = [];
        document.getElementById('stream-log').innerHTML = '';

        streamEventSource.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.type === 'connected') {
                    document.getElementById('stream-status').textContent = '接続済み ●';
                    document.getElementById('stream-status').style.background = '#d1fae5';
                    document.getElementById('stream-status').style.color = '#065f46';
                } else if (data.type === 'log') {
                    appendStreamLine(data.line);
                } else if (data.type === 'heartbeat') {
                    // noop
                } else if (data.type === 'error') {
                    showAlert('ストリームエラー: ' + data.message, 'danger');
                    stopStream();
                }
            } catch {}
        };

        streamEventSource.onerror = () => {
            document.getElementById('stream-status').textContent = '切断';
            document.getElementById('stream-status').style.background = '#fee2e2';
            document.getElementById('stream-status').style.color = '#991b1b';
        };
    }

    function stopStream() {
        if (streamEventSource) {
            streamEventSource.close();
            streamEventSource = null;
        }
        const startBtn = document.getElementById('stream-start-btn');
        const stopBtn = document.getElementById('stream-stop-btn');
        const statusEl = document.getElementById('stream-status');
        if (startBtn) startBtn.style.display = '';
        if (stopBtn) stopBtn.style.display = 'none';
        if (statusEl) {
            statusEl.textContent = '停止中';
            statusEl.style.background = '';
            statusEl.style.color = '';
        }
    }

    function appendStreamLine(line) {
        streamLines.push(line);
        if (streamLines.length > MAX_STREAM_LINES) streamLines.shift();
        const container = document.getElementById('stream-log');
        const span = document.createElement('span');
        span.className = 'log-line' + (line.match(/error|critical|fatal/i) ? ' error' : '');
        span.textContent = line;
        container.appendChild(span);
        container.appendChild(document.createElement('br'));
        // 最大行数超過時に先頭削除
        while (container.children.length > MAX_STREAM_LINES * 2) {
            container.removeChild(container.firstChild);
        }
        // 自動スクロール
        container.scrollTop = container.scrollHeight;
    }

    // 初期ロード
    loadFileList();
    loadRecentErrors();
    initDefaultQueries();

    // ===== 保存クエリ管理 =====
    const STORAGE_KEY = 'lms_saved_queries';

    const DEFAULT_QUERIES = [
        { pattern: 'error',            logfile: 'syslog'   },
        { pattern: 'Failed password',  logfile: 'auth.log' },
        { pattern: 'OOM|Out of memory', logfile: 'syslog'  },
        { pattern: 'critical',         logfile: 'syslog'   },
    ];

    function getSavedQueries() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
    }

    function saveQuery(pattern, logfile) {
        if (!pattern.trim()) { showAlert('検索キーワードを入力してから保存してください', 'warning'); return; }
        const queries = getSavedQueries();
        if (queries.some(q => q.pattern === pattern && q.logfile === logfile)) {
            showAlert('このクエリは既に保存済みです', 'info');
            return;
        }
        queries.unshift({ id: Date.now(), pattern, logfile, savedAt: new Date().toISOString() });
        if (queries.length > 20) queries.splice(20);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(queries));
        renderSavedQueries();
        showAlert(`「${pattern}」を保存しました`, 'success');
    }

    function deleteSavedQuery(id) {
        const queries = getSavedQueries().filter(q => q.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(queries));
        renderSavedQueries();
    }

    function renderSavedQueries() {
        const queries = getSavedQueries();
        const container = document.getElementById('saved-queries-list');
        if (!container) return;
        document.getElementById('saved-count').textContent = queries.length;
        if (queries.length === 0) {
            container.innerHTML = '<p class="text-muted small mb-0">保存済みクエリはありません</p>';
            return;
        }
        container.innerHTML = queries.map(q => `
            <div class="d-flex align-items-center gap-2 mb-2">
                <button class="btn btn-sm btn-outline-primary flex-grow-1 text-start"
                        onclick="applyQuery(${JSON.stringify(q.pattern)}, ${JSON.stringify(q.logfile)})">
                    <span class="fw-semibold">${escapeHtml(q.pattern)}</span>
                    <small class="text-muted ms-2">${escapeHtml(q.logfile)}</small>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteSavedQuery(${q.id})" title="削除">🗑</button>
            </div>
        `).join('');
    }

    function applyQuery(pattern, logfile) {
        document.getElementById('keyword-input').value = pattern;
        const sel = document.getElementById('logfile-select');
        if (sel) {
            const opt = Array.from(sel.options).find(o => o.value === logfile);
            if (opt) sel.value = logfile;
        }
        searchLogs();
    }

    function initDefaultQueries() {
        if (getSavedQueries().length === 0) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(
                DEFAULT_QUERIES.map((q, i) => ({ ...q, id: i + 1, savedAt: new Date().toISOString() }))
            ));
        }
        renderSavedQueries();
    }
</script>
</body>
