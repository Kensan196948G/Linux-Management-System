<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postfix メール - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-card { background: white; border-radius: 8px; border: 1px solid #e5e7eb; padding: 20px; margin-bottom: 16px; }
        .status-title { font-size: 16px; font-weight: bold; color: #111827; margin-bottom: 14px; }
        .badge-running { background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-stopped { background: #fee2e2; color: #991b1b; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-unavail { background: #f3f4f6; color: #6b7280; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .raw-output { background: #1e293b; color: #e2e8f0; border-radius: 6px; padding: 14px; font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        .metric-val { font-size: 22px; font-weight: bold; color: #1e293b; }
        .metric-label { font-size: 12px; color: #6b7280; }
        .unavail-notice { background: #fefce8; border: 1px solid #fde047; border-radius: 8px; padding: 12px; color: #713f12; font-size: 13px; }
        .nav-tabs .nav-link.active { color: #2563eb; font-weight: 600; border-bottom: 2px solid #2563eb; background: none; }
        .nav-tabs .nav-link { color: #6b7280; }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar-container"></aside>
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">📧 Postfix メール管理</h1>
            <button class="btn btn-sm btn-outline-secondary" onclick="refreshAll()">🔄 更新</button>
        </div>

        <!-- ステータスカード -->
        <div class="status-card">
            <div class="status-title">📊 Postfix ステータス</div>
            <div id="status-content"><span class="text-muted">読み込み中...</span></div>
        </div>

        <!-- タブ -->
        <ul class="nav nav-tabs mb-3" id="mainTab">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-queue">📬 キュー</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-queue-detail">🔍 キュー詳細</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-config">⚙️ 設定</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-stats">📈 統計</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-logs">📜 ログ</a></li>
        </ul>

        <div class="tab-content">
            <!-- メールキュータブ -->
            <div class="tab-pane fade show active" id="tab-queue">
                <div class="status-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="status-title">📬 メールキュー</div>
                        <button class="btn btn-sm btn-primary" onclick="loadQueue()">🔄 更新</button>
                    </div>
                    <div id="queue-content"><span class="text-muted">読み込み中...</span></div>
                </div>
            </div>

            <!-- キュー詳細タブ -->
            <div class="tab-pane fade" id="tab-queue-detail">
                <div class="status-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="status-title">🔍 キュー詳細 (postqueue -p)</div>
                        <button class="btn btn-sm btn-primary" onclick="loadQueueDetail()">🔄 更新</button>
                    </div>
                    <div id="queue-detail-content"><span class="text-muted">タブを開くと読み込みます...</span></div>
                </div>
            </div>

            <!-- 設定タブ -->
            <div class="tab-pane fade" id="tab-config">
                <div class="status-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="status-title">⚙️ 本番設定 (postconf -n)</div>
                        <button class="btn btn-sm btn-primary" onclick="loadConfig()">🔄 更新</button>
                    </div>
                    <div id="config-content"><span class="text-muted">タブを開くと読み込みます...</span></div>
                </div>
            </div>

            <!-- 統計タブ -->
            <div class="tab-pane fade" id="tab-stats">
                <div class="status-card">
                    <div class="status-title">📈 送受信統計</div>
                    <div id="stats-content"><span class="text-muted">タブを開くと読み込みます...</span></div>
                </div>
            </div>

            <!-- ログタブ -->
            <div class="tab-pane fade" id="tab-logs">
                <div class="status-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="status-title">📜 Postfix ログ</div>
                        <div class="d-flex gap-2 align-items-center">
                            <select id="log-lines" class="form-select form-select-sm" style="width:100px">
                                <option value="50">50行</option>
                                <option value="100">100行</option>
                                <option value="200">200行</option>
                            </select>
                            <button class="btn btn-sm btn-primary" onclick="loadLogs()">🔄 更新</button>
                        </div>
                    </div>
                    <div id="logs-content"><span class="text-muted">読み込み中...</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="../js/env-config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>renderSidebar('postfix')):renderSidebar('postfix');</script>
<script>
const API_BASE = '/api';

function getToken() {
    return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
}

function authHeaders() {
    return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
}

async function apiFetch(path) {
    const resp = await fetch(API_BASE + path, { headers: authHeaders() });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
}

function statusBadge(status) {
    if (status === 'running') return '<span class="badge-running">稼働中</span>';
    if (status === 'stopped') return '<span class="badge-stopped">停止中</span>';
    if (status === 'unavailable') return '<span class="badge-unavail">未インストール</span>';
    return `<span class="badge-unavail">${status || '不明'}</span>`;
}

async function loadStatus() {
    const el = document.getElementById('status-content');
    try {
        const res = await apiFetch('/postfix/status');
        const d = res.data;
        if (d.status === 'unavailable') {
            el.innerHTML = '<div class="unavail-notice">⚠️ Postfix はインストールされていません。</div>';
            return;
        }
        el.innerHTML = `
        <div class="row g-3">
          <div class="col-md-3 text-center">
            <div class="metric-val">${statusBadge(d.status)}</div>
            <div class="metric-label">ステータス</div>
          </div>
          <div class="col-md-3 text-center">
            <div class="metric-val">${d.queue_count ?? '—'}</div>
            <div class="metric-label">キュー件数</div>
          </div>
          <div class="col-md-6">
            <div class="metric-label">バージョン</div>
            <div class="metric-val" style="font-size:14px">${d.version || '—'}</div>
          </div>
        </div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

async function loadQueue() {
    const el = document.getElementById('queue-content');
    el.innerHTML = '<span class="text-muted">読み込み中...</span>';
    try {
        const res = await apiFetch('/postfix/queue');
        const d = res.data;
        if (d.status === 'unavailable') {
            el.innerHTML = '<div class="unavail-notice">⚠️ Postfix はインストールされていません。</div>';
            return;
        }
        const queueText = d.queue || 'キューは空です';
        el.innerHTML = `<div class="raw-output">${escapeHtml(queueText)}</div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

async function loadQueueDetail() {
    const el = document.getElementById('queue-detail-content');
    el.innerHTML = '<span class="text-muted">読み込み中...</span>';
    try {
        const res = await apiFetch('/postfix/queue-detail');
        const d = res.data;
        if (d.status === 'unavailable') {
            el.innerHTML = '<div class="unavail-notice">⚠️ Postfix はインストールされていません。</div>';
            return;
        }
        const text = d.queue_detail || '(キュー詳細なし)';
        el.innerHTML = `<div class="raw-output">${escapeHtml(text)}</div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

async function loadConfig() {
    const el = document.getElementById('config-content');
    el.innerHTML = '<span class="text-muted">読み込み中...</span>';
    try {
        const res = await apiFetch('/postfix/config');
        const d = res.data;
        if (d.status === 'unavailable') {
            el.innerHTML = '<div class="unavail-notice">⚠️ Postfix はインストールされていません。</div>';
            return;
        }
        const text = d.config || '(設定なし)';
        el.innerHTML = `<div class="raw-output">${escapeHtml(text)}</div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

async function loadStats() {
    const el = document.getElementById('stats-content');
    el.innerHTML = '<span class="text-muted">読み込み中...</span>';
    try {
        const res = await apiFetch('/postfix/stats');
        const d = res.data;
        if (d.status === 'unavailable') {
            el.innerHTML = '<div class="unavail-notice">⚠️ Postfix はインストールされていません。</div>';
            return;
        }
        el.innerHTML = `
        <div class="row g-3 text-center">
          <div class="col-md-4">
            <div class="metric-val text-success">${d.sent ?? '—'}</div>
            <div class="metric-label">送信完了</div>
          </div>
          <div class="col-md-4">
            <div class="metric-val text-primary">${d.received ?? '—'}</div>
            <div class="metric-label">受信</div>
          </div>
          <div class="col-md-4">
            <div class="metric-val text-warning">${d.deferred ?? '—'}</div>
            <div class="metric-label">遅延</div>
          </div>
        </div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

async function loadLogs() {
    const el = document.getElementById('logs-content');
    const lines = document.getElementById('log-lines').value;
    el.innerHTML = '<span class="text-muted">読み込み中...</span>';
    try {
        const res = await apiFetch(`/postfix/logs?lines=${lines}`);
        const d = res.data;
        const logText = d.logs || '(ログなし)';
        el.innerHTML = `<div class="raw-output">${escapeHtml(logText)}</div>`;
    } catch (e) {
        el.innerHTML = `<div class="text-danger">エラー: ${e.message}</div>`;
    }
}

function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function refreshAll() {
    loadStatus();
    loadQueue();
}

document.addEventListener('DOMContentLoaded', () => {
    if (!getToken()) { window.location.href = window.location.pathname.replace(/[^/]*$/, '') + 'index.html'; return; }
    loadStatus();
    loadQueue();
    document.querySelector('[href="#tab-queue-detail"]').addEventListener('shown.bs.tab', loadQueueDetail);
    document.querySelector('[href="#tab-config"]').addEventListener('shown.bs.tab', loadConfig);
    document.querySelector('[href="#tab-stats"]').addEventListener('shown.bs.tab', loadStats);
    document.querySelector('[href="#tab-logs"]').addEventListener('shown.bs.tab', loadLogs);
});
</script>
</body>
</html>
