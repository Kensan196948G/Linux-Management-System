<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon-dev.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Server SSH - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        .tab-nav {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .tab-btn:hover:not(.active) { color: #374151; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 16px;
        }

        .host-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .host-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .host-checkbox-item:hover { border-color: #3b82f6; background: #eff6ff; }
        .host-checkbox-item.selected { border-color: #3b82f6; background: #eff6ff; }
        .host-checkbox-item input[type="checkbox"] { accent-color: #3b82f6; }
        .host-label { font-size: 13px; font-weight: 500; color: #374151; }
        .host-ip { font-size: 11px; color: #9ca3af; }

        .cmd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .cmd-radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .cmd-radio-item:hover { border-color: #10b981; background: #f0fdf4; }
        .cmd-radio-item.selected { border-color: #10b981; background: #f0fdf4; }
        .cmd-radio-item input[type="radio"] { accent-color: #10b981; }

        .results-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .results-table th {
            text-align: left;
            padding: 8px 12px;
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .results-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
            vertical-align: middle;
        }
        .results-table tr:hover td { background: #f9fafb; }

        .badge-success {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 9999px;
            background: #d1fae5; color: #065f46; font-size: 12px; font-weight: 600;
        }
        .badge-error {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 9999px;
            background: #fee2e2; color: #991b1b; font-size: 12px; font-weight: 600;
        }
        .badge-running {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 9999px;
            background: #dbeafe; color: #1e40af; font-size: 12px; font-weight: 600;
        }
        .badge-pending {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 9999px;
            background: #fef3c7; color: #92400e; font-size: 12px; font-weight: 600;
        }

        .output-cell {
            max-width: 400px;
        }
        .output-toggle {
            background: none; border: none; cursor: pointer;
            color: #3b82f6; font-size: 12px; padding: 0;
            text-decoration: underline;
        }
        .output-pre {
            display: none;
            margin-top: 6px;
            background: #1e293b;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        .output-pre.visible { display: block; }

        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th {
            text-align: left;
            padding: 8px 12px;
            background: #f9fafb;
            border-bottom: 2px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
        }
        .history-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }
        .history-table tr:hover td { background: #f9fafb; }

        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; padding: 8px 12px;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 13px; color: #374151;
        }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

        .btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.15s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .hidden { display: none !important; }

        .progress-bar-wrap { height: 4px; background: #e5e7eb; border-radius: 2px; margin-bottom: 12px; }
        .progress-bar { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s; }

        .stat-row { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
        .stat-item { font-size: 13px; color: #6b7280; }
        .stat-item strong { color: #111827; }

        .cmd-badge {
            display: inline-block; padding: 2px 8px;
            background: #f3f4f6; border-radius: 4px;
            font-family: monospace; font-size: 12px; color: #374151;
        }

        .select-all-btn {
            font-size: 12px; color: #3b82f6; background: none;
            border: none; cursor: pointer; padding: 0; margin-bottom: 8px;
            text-decoration: underline;
        }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
    <div class="page-header">
        <h1 class="page-title">🖥️ マルチサーバーSSH並列実行</h1>
        <p class="page-subtitle">複数のSSHホストに対してコマンドを並列実行します</p>
    </div>

    <div id="alert-area"></div>

    <!-- タブナビゲーション -->
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="execute">🚀 コマンド実行</button>
        <button class="tab-btn" data-tab="history">📋 実行履歴</button>
        <button class="tab-btn" data-tab="commands">📖 許可コマンド一覧</button>
    </div>

    <!-- タブ1: コマンド実行 -->
    <div id="tab-execute" class="tab-panel active">
        <div class="card">
            <div class="card-title">ホスト選択</div>
            <button class="select-all-btn" id="btn-select-all">すべて選択</button>
            <button class="select-all-btn" id="btn-deselect-all" style="margin-left:12px;color:#6b7280;">選択解除</button>
            <div id="host-grid" class="host-grid">
                <div style="color:#9ca3af;font-size:13px;">ホストを読み込み中...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">コマンド選択</div>
            <div id="cmd-grid" class="cmd-grid">
                <div style="color:#9ca3af;font-size:13px;">コマンドを読み込み中...</div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label class="form-label" for="exec-reason">実行理由 <span style="color:#ef4444">*</span></label>
                <input type="text" id="exec-reason" class="form-input" placeholder="例: 定期確認 2025-01" maxlength="256">
            </div>
            <button id="btn-execute" class="btn btn-primary" disabled>▶ 並列実行</button>
            <span id="exec-hint" style="margin-left:12px;font-size:12px;color:#9ca3af;">ホストとコマンドを選択してください</span>
        </div>

        <!-- 実行結果 -->
        <div id="result-area" class="hidden">
            <div class="card">
                <div class="card-title">実行結果</div>
                <div id="result-meta" class="stat-row"></div>
                <div id="progress-wrap" class="progress-bar-wrap hidden">
                    <div id="progress-bar" class="progress-bar" style="width:0%"></div>
                </div>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>ホスト名</th>
                            <th>IPアドレス</th>
                            <th>結果</th>
                            <th>出力</th>
                            <th>実行時間</th>
                        </tr>
                    </thead>
                    <tbody id="result-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- タブ2: 実行履歴 -->
    <div id="tab-history" class="tab-panel">
        <div class="card">
            <div class="card-title">実行履歴</div>
            <button class="btn btn-primary" id="btn-refresh-history" style="margin-bottom:12px;padding:6px 14px;font-size:13px;">🔄 更新</button>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>コマンド</th>
                        <th>ホスト数</th>
                        <th>成功/失敗</th>
                        <th>実行日時</th>
                        <th>ステータス</th>
                        <th>実行者</th>
                        <th>理由</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                    <tr><td colspan="8" style="color:#9ca3af;text-align:center;padding:20px;">履歴なし</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- タブ3: 許可コマンド一覧 -->
    <div id="tab-commands" class="tab-panel">
        <div class="card">
            <div class="card-title">許可コマンド一覧</div>
            <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">
                以下のコマンドのみ実行可能です。read-only コマンドは承認不要で即時実行されます。
            </p>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>コマンド</th>
                        <th>カテゴリ</th>
                    </tr>
                </thead>
                <tbody id="commands-tbody">
                    <tr><td colspan="2" style="color:#9ca3af;text-align:center;padding:20px;">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="../js/common.js"></script>
<script>
const API_BASE = '/api';

// ===================================================================
// 状態管理
// ===================================================================
let _selectedHosts = new Set();
let _selectedCommand = '';
let _allHosts = [];
let _allCommands = [];
let _readonlyCommands = [];
let _currentJobId = null;
let _pollTimer = null;

// ===================================================================
// 共通ユーティリティ
// ===================================================================
function showAlert(msg, type = 'info') {
    const area = document.getElementById('alert-area');
    area.innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
    setTimeout(() => { area.innerHTML = ''; }, 6000);
}

function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
    if (!iso) return '-';
    try { return new Date(iso + (iso.endsWith('Z') ? '' : 'Z')).toLocaleString('ja-JP'); }
    catch { return iso; }
}

function badgeHtml(status) {
    if (status === 'completed') return `<span class="badge-success">✅ 完了</span>`;
    if (status === 'running') return `<span class="badge-running">⏳ 実行中</span>`;
    if (status === 'pending_approval') return `<span class="badge-pending">🕐 承認待ち</span>`;
    return `<span class="badge-error">${escapeHtml(status)}</span>`;
}

async function apiFetch(path, options = {}) {
    const token = localStorage.getItem('access_token');
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const resp = await fetch(API_BASE + path, { ...options, headers });
    if (resp.status === 401) { window.location.href = '/dev/index.html'; throw new Error('Unauthorized'); }
    return resp;
}

// ===================================================================
// 初期ロード
// ===================================================================
async function loadHosts() {
    try {
        const resp = await apiFetch('/ssh-hosts/');
        if (!resp.ok) { document.getElementById('host-grid').innerHTML = '<div style="color:#ef4444">ホスト取得エラー</div>'; return; }
        const data = await resp.json();
        _allHosts = Array.isArray(data) ? data : (data.hosts || []);
        renderHostGrid();
    } catch (e) {
        document.getElementById('host-grid').innerHTML = `<div style="color:#ef4444">${escapeHtml(e.message)}</div>`;
    }
}

async function loadCommands() {
    try {
        const resp = await apiFetch('/multi-ssh/commands');
        if (!resp.ok) { document.getElementById('cmd-grid').innerHTML = '<div style="color:#ef4444">コマンド取得エラー</div>'; return; }
        const data = await resp.json();
        _allCommands = data.commands || [];
        _readonlyCommands = data.readonly_commands || [];
        renderCommandGrid();
        renderCommandsTable();
    } catch (e) {
        document.getElementById('cmd-grid').innerHTML = `<div style="color:#ef4444">${escapeHtml(e.message)}</div>`;
    }
}

// ===================================================================
// ホストグリッド
// ===================================================================
function renderHostGrid() {
    const grid = document.getElementById('host-grid');
    if (_allHosts.length === 0) {
        grid.innerHTML = '<div style="color:#9ca3af;font-size:13px;">登録済みホストがありません。<a href="/dev/ssh-hosts.html">SSHホスト管理</a>で追加してください。</div>';
        return;
    }
    grid.innerHTML = _allHosts.map(h => `
        <label class="host-checkbox-item" id="host-item-${h.id}">
            <input type="checkbox" value="${h.id}" onchange="toggleHost('${h.id}')">
            <div>
                <div class="host-label">${escapeHtml(h.name || h.hostname || h.host || h.id)}</div>
                <div class="host-ip">${escapeHtml(h.hostname || h.host || h.ip || '')}</div>
            </div>
        </label>
    `).join('');
}

function toggleHost(id) {
    const item = document.getElementById(`host-item-${id}`);
    if (_selectedHosts.has(id)) { _selectedHosts.delete(id); item.classList.remove('selected'); }
    else { _selectedHosts.add(id); item.classList.add('selected'); }
    updateExecuteButton();
}

document.getElementById('btn-select-all').addEventListener('click', () => {
    _allHosts.forEach(h => {
        _selectedHosts.add(h.id);
        const item = document.getElementById(`host-item-${h.id}`);
        if (item) { item.classList.add('selected'); item.querySelector('input').checked = true; }
    });
    updateExecuteButton();
});
document.getElementById('btn-deselect-all').addEventListener('click', () => {
    _selectedHosts.clear();
    document.querySelectorAll('#host-grid .host-checkbox-item').forEach(el => {
        el.classList.remove('selected'); el.querySelector('input').checked = false;
    });
    updateExecuteButton();
});

// ===================================================================
// コマンドグリッド
// ===================================================================
function renderCommandGrid() {
    const grid = document.getElementById('cmd-grid');
    grid.innerHTML = _allCommands.map(cmd => `
        <label class="cmd-radio-item" id="cmd-item-${encodeURIComponent(cmd)}">
            <input type="radio" name="cmd" value="${escapeHtml(cmd)}" onchange="selectCommand('${escapeHtml(cmd).replace(/'/g,'\\\'')}')" >
            <span style="font-family:monospace;font-size:13px;">${escapeHtml(cmd)}</span>
        </label>
    `).join('');
}

function selectCommand(cmd) {
    document.querySelectorAll('#cmd-grid .cmd-radio-item').forEach(el => el.classList.remove('selected'));
    const key = encodeURIComponent(cmd);
    const el = document.getElementById(`cmd-item-${key}`);
    if (el) el.classList.add('selected');
    _selectedCommand = cmd;
    updateExecuteButton();
}

// ===================================================================
// 実行ボタン制御
// ===================================================================
function updateExecuteButton() {
    const btn = document.getElementById('btn-execute');
    const hint = document.getElementById('exec-hint');
    const ok = _selectedHosts.size > 0 && _selectedCommand !== '';
    btn.disabled = !ok;
    hint.textContent = ok ? `${_selectedHosts.size} ホスト × "${_selectedCommand}"` : 'ホストとコマンドを選択してください';
}

// ===================================================================
// 実行
// ===================================================================
document.getElementById('btn-execute').addEventListener('click', executeCommand);

async function executeCommand() {
    const reason = document.getElementById('exec-reason').value.trim();
    if (!reason) { showAlert('実行理由を入力してください', 'error'); return; }
    if (_selectedHosts.size === 0) { showAlert('ホストを選択してください', 'error'); return; }
    if (!_selectedCommand) { showAlert('コマンドを選択してください', 'error'); return; }

    document.getElementById('btn-execute').disabled = true;
    showAlert('実行中...', 'info');

    try {
        const resp = await apiFetch('/multi-ssh/execute', {
            method: 'POST',
            body: JSON.stringify({
                host_ids: Array.from(_selectedHosts),
                command: _selectedCommand,
                reason: reason,
            }),
        });
        const data = await resp.json();
        if (!resp.ok) { showAlert(data.detail || data.message || '実行エラー', 'error'); document.getElementById('btn-execute').disabled = false; return; }

        _currentJobId = data.job_id;
        if (data.status === 'pending_approval') {
            showAlert(`承認待ちリクエストを作成しました (承認ID: ${data.approval_id || '-'})`, 'warning');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('result-meta').innerHTML = `<div class="stat-item"><strong>Job ID:</strong> ${escapeHtml(data.job_id)}</div><div class="stat-item"><strong>ステータス:</strong> ${badgeHtml('pending_approval')}</div>`;
        } else {
            showAlert('実行を開始しました', 'success');
            showResultArea(data);
            startPolling(data.job_id);
        }
    } catch (e) {
        showAlert(e.message, 'error');
    } finally {
        document.getElementById('btn-execute').disabled = false;
        updateExecuteButton();
    }
}

function showResultArea(data) {
    document.getElementById('result-area').classList.remove('hidden');
    document.getElementById('progress-wrap').classList.remove('hidden');
    document.getElementById('progress-bar').style.width = '10%';
    document.getElementById('result-meta').innerHTML = `
        <div class="stat-item"><strong>Job ID:</strong> ${escapeHtml(data.job_id)}</div>
        <div class="stat-item"><strong>コマンド:</strong> <span class="cmd-badge">${escapeHtml(data.command)}</span></div>
        <div class="stat-item"><strong>ホスト数:</strong> ${data.total_hosts}</div>
        <div class="stat-item"><strong>ステータス:</strong> ${badgeHtml('running')}</div>
    `;
    document.getElementById('result-tbody').innerHTML = '';
}

function startPolling(jobId) {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(() => pollResult(jobId), 1000);
}

async function pollResult(jobId) {
    try {
        const resp = await apiFetch(`/multi-ssh/results/${jobId}`);
        if (!resp.ok) return;
        const data = await resp.json();
        const job = data.job || {};
        if (job.status === 'completed') {
            clearInterval(_pollTimer);
            renderResults(job);
        }
    } catch (e) { /* ignore */ }
}

function renderResults(job) {
    document.getElementById('progress-wrap').classList.add('hidden');
    const successPct = job.total_hosts > 0 ? Math.round((job.success_count / job.total_hosts) * 100) : 0;
    document.getElementById('result-meta').innerHTML = `
        <div class="stat-item"><strong>Job ID:</strong> ${escapeHtml(job.job_id)}</div>
        <div class="stat-item"><strong>コマンド:</strong> <span class="cmd-badge">${escapeHtml(job.command)}</span></div>
        <div class="stat-item"><strong>ホスト数:</strong> ${job.total_hosts}</div>
        <div class="stat-item"><strong>成功:</strong> <span style="color:#059669">${job.success_count}</span></div>
        <div class="stat-item"><strong>失敗:</strong> <span style="color:#dc2626">${job.failure_count}</span></div>
        <div class="stat-item"><strong>完了:</strong> ${formatDate(job.completed_at)}</div>
        <div class="stat-item">${badgeHtml('completed')}</div>
    `;
    const tbody = document.getElementById('result-tbody');
    const results = job.results || [];
    if (results.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="color:#9ca3af;text-align:center">結果なし</td></tr>'; return; }
    tbody.innerHTML = results.map((r, i) => `
        <tr>
            <td><strong>${escapeHtml(r.hostname || r.host_id)}</strong></td>
            <td>${escapeHtml(r.ip || '-')}</td>
            <td>${r.success ? '<span class="badge-success">✅ 成功</span>' : '<span class="badge-error">❌ 失敗</span>'}</td>
            <td class="output-cell">
                <button class="output-toggle" onclick="toggleOutput('out-${i}')">出力を表示</button>
                <pre id="out-${i}" class="output-pre">${escapeHtml(r.output || '')}</pre>
            </td>
            <td>${r.elapsed_ms} ms</td>
        </tr>
    `).join('');
}

function toggleOutput(id) {
    const el = document.getElementById(id);
    const btn = el.previousElementSibling;
    el.classList.toggle('visible');
    btn.textContent = el.classList.contains('visible') ? '出力を隠す' : '出力を表示';
}

// ===================================================================
// 実行履歴
// ===================================================================
async function loadHistory() {
    try {
        const resp = await apiFetch('/multi-ssh/history');
        if (!resp.ok) return;
        const data = await resp.json();
        const tbody = document.getElementById('history-tbody');
        const history = data.history || [];
        if (history.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="color:#9ca3af;text-align:center;padding:20px;">履歴なし</td></tr>'; return; }
        tbody.innerHTML = history.map(h => `
            <tr>
                <td style="font-family:monospace;font-size:11px;color:#6b7280">${escapeHtml(h.job_id.substring(0,8))}…</td>
                <td><span class="cmd-badge">${escapeHtml(h.command)}</span></td>
                <td>${h.host_count}</td>
                <td><span style="color:#059669">${h.success_count}</span> / <span style="color:#dc2626">${h.failure_count}</span></td>
                <td>${formatDate(h.created_at)}</td>
                <td>${badgeHtml(h.status)}</td>
                <td>${escapeHtml(h.requester || '-')}</td>
                <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(h.reason)}">${escapeHtml(h.reason || '-')}</td>
            </tr>
        `).join('');
    } catch (e) { /* ignore */ }
}

document.getElementById('btn-refresh-history').addEventListener('click', loadHistory);

// ===================================================================
// 許可コマンド一覧
// ===================================================================
function renderCommandsTable() {
    const tbody = document.getElementById('commands-tbody');
    tbody.innerHTML = _allCommands.map(cmd => {
        const isRo = _readonlyCommands.includes(cmd);
        return `
            <tr>
                <td><span class="cmd-badge">${escapeHtml(cmd)}</span></td>
                <td>${isRo ? '<span class="badge-success">即時実行（承認不要）</span>' : '<span class="badge-pending">承認必要</span>'}</td>
            </tr>
        `;
    }).join('');
}

// ===================================================================
// タブ切り替え
// ===================================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'history') loadHistory();
    });
});

// ===================================================================
// 初期化
// ===================================================================
(async () => {
    await Promise.all([loadHosts(), loadCommands()]);
})();

// サイドバー読み込み
if (typeof loadSidebar === 'function') loadSidebar();
</script>
</body>
</html>
