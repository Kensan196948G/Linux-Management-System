<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon-dev.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー・グループ管理 - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="../vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* ユーザーテーブル専用スタイル */
        .users-table {
            width: 100%;
            font-size: 14px;
        }

        .users-table th {
            background-color: #2c3e50;
            color: white;
            padding: 10px 8px;
            font-weight: bold;
            border-bottom: 2px solid #34495e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .users-table td {
            padding: 8px;
            border-bottom: 1px solid #ecf0f1;
            vertical-align: middle;
        }

        .users-table tr:hover {
            background-color: #f8f9fa;
        }

        /* コントロールバー */
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
        }

        .control-group select,
        .control-group input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        /* タブスタイル */
        .tab-header {
            display: flex;
            gap: 0;
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 15px;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #2c3e50;
        }

        .tab-btn.active {
            color: #2c3e50;
            border-bottom-color: #3498db;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ステータスバッジ */
        .badge-locked { background-color: #ef4444; }
        .badge-active { background-color: #10b981; }

        /* ロールバッジ */
        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .role-admin    { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .role-approver { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .role-operator { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .role-viewer   { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }
        .role-unknown  { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; font-style: italic; }

        /* 検索バー */
        .search-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .search-bar input {
            max-width: 280px;
            font-size: 13px;
        }
        .role-note {
            font-size: 11px;
            color: #6b7280;
            font-style: italic;
            margin-top: 2px;
        }

        /* パスワード強度バー */
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 4px;
            transition: all 0.3s;
        }

        .strength-weak { background-color: #ef4444; width: 25%; }
        .strength-fair { background-color: #f59e0b; width: 50%; }
        .strength-good { background-color: #3b82f6; width: 75%; }
        .strength-strong { background-color: #10b981; width: 100%; }

        /* 統計カード */
        .stats-card {
            background: linear-gradient(135deg, #3498db, #2c3e50);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .stat-item {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 左側サイドバー -->
        <aside class="sidebar" id="sidebar-container"></aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <div class="main-header">
                <h2 id="page-title">👥 ユーザー・グループ管理</h2>
            </div>

            <div class="main-body" id="main-body">
                <!-- アラートコンテナ -->
                <div id="usersAlertContainer"></div>

                <!-- 統計カード -->
                <div class="stats-card" id="usersStatsCard" style="display: none;">
                    <h5>📊 ユーザー統計</h5>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">総ユーザー数</div>
                            <div class="stat-value" id="stat-total-users">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">アクティブ</div>
                            <div class="stat-value" id="stat-active-users">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">ロック済み</div>
                            <div class="stat-value" id="stat-locked-users">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">グループ数</div>
                            <div class="stat-value" id="stat-total-groups">-</div>
                        </div>
                    </div>
                </div>

                <!-- タブヘッダー -->
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="users" id="users-tab">
                        <i class="bi bi-people"></i> ユーザー
                    </button>
                    <button class="tab-btn" data-tab="groups" id="groups-tab">
                        <i class="bi bi-diagram-3"></i> グループ
                    </button>
                </div>

                <!-- ユーザータブ -->
                <div class="tab-content active" id="tabUsers">
                    <!-- フィルタコントロール -->
                    <div class="controls-bar">
                        <div class="control-group">
                            <label for="sortBy">ソート</label>
                            <select id="sortBy">
                                <option value="username">ユーザー名</option>
                                <option value="uid">UID</option>
                                <option value="last_login">最終ログイン</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label for="filterLocked">ステータス</label>
                            <select id="filterLocked">
                                <option value="">全て</option>
                                <option value="false">アクティブのみ</option>
                                <option value="true">ロック済みのみ</option>
                            </select>
                        </div>

                        <div class="control-group">
                            <label for="limitCount">表示数</label>
                            <select id="limitCount">
                                <option value="50">50</option>
                                <option value="100" selected>100</option>
                                <option value="200">200</option>
                                <option value="500">500</option>
                            </select>
                        </div>

                        <div class="control-group" style="margin-left: auto;">
                            <label>&nbsp;</label>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn btn-sm btn-primary" id="addUserBtn">
                                    <i class="bi bi-person-plus"></i> ユーザー追加
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" id="refreshBtn">
                                    <i class="bi bi-arrow-clockwise"></i> 更新
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" id="autoRefreshBtn" title="自動更新: OFF">
                                    <i class="bi bi-clock"></i> 自動更新
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ステータス表示 / 検索 -->
                    <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                        <span id="usersStatusText" class="text-muted small"></span>
                        <div class="d-flex align-items-center gap-2">
                            <input type="text" class="form-control form-control-sm" id="userSearchInput"
                                placeholder="🔍 ユーザー名で絞り込み" style="max-width:220px;"
                                oninput="filterUserTable(this.value)">
                            <span id="usersLoadingSpinner" style="display: none;">
                                <span class="spinner-border spinner-border-sm"></span> 読み込み中...
                            </span>
                        </div>
                    </div>

                    <!-- ユーザーテーブル -->
                    <div class="table-responsive">
                        <table class="table table-sm table-hover users-table">
                            <thead>
                                <tr>
                                    <th>ユーザー名</th>
                                    <th>メールアドレス</th>
                                    <th>ロール</th>
                                    <th>状態</th>
                                    <th>最終ログイン</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr>
                                    <td colspan="6" class="text-center text-muted py-4">読み込み中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- グループタブ -->
                <div class="tab-content" id="tabGroups">
                    <div class="controls-bar">
                        <div class="control-group" style="margin-left: auto;">
                            <label>&nbsp;</label>
                            <button class="btn btn-sm btn-outline-secondary" id="refreshGroupsBtn">
                                <i class="bi bi-arrow-clockwise"></i> 更新
                            </button>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm table-hover users-table">
                            <thead>
                                <tr>
                                    <th>グループ名</th>
                                    <th>GID</th>
                                    <th>メンバー</th>
                                </tr>
                            </thead>
                            <tbody id="groupTableBody">
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-4">読み込み中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ユーザー追加モーダル -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addUserModalLabel">ユーザー追加</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addUserForm">
                    <div class="modal-body">
                        <div id="addUserModalAlert"></div>

                        <div class="mb-3">
                            <label for="add-username" class="form-label">ユーザー名</label>
                            <input type="text" class="form-control" id="add-username" required
                                pattern="^[a-z_][a-z0-9_-]{0,31}$" maxlength="32"
                                placeholder="例: new-user">
                            <div class="invalid-feedback" id="username-feedback" style="display:none;"></div>
                            <div class="form-text">小文字英字, 数字, ハイフン, アンダースコアのみ（32文字以内）</div>
                        </div>

                        <div class="mb-3">
                            <label for="add-password" class="form-label">パスワード</label>
                            <input type="password" class="form-control" id="add-password" required minlength="8">
                            <div class="progress mt-1" style="height:4px;">
                                <div class="progress-bar" id="password-strength-bar" style="width:0%;"></div>
                            </div>
                            <div class="form-text" id="password-strength-text"></div>
                        </div>

                        <div class="mb-3">
                            <label for="add-password-confirm" class="form-label">パスワード（確認）</label>
                            <input type="password" class="form-control" id="add-password-confirm" required minlength="8">
                        </div>

                        <div class="mb-3">
                            <label for="add-gecos" class="form-label">説明（GECOS）</label>
                            <input type="text" class="form-control" id="add-gecos" maxlength="100"
                                placeholder="例: Taro Yamada">
                        </div>

                        <div class="mb-3">
                            <label for="add-shell" class="form-label">シェル</label>
                            <select class="form-select" id="add-shell">
                                <option value="/bin/bash">/bin/bash</option>
                                <option value="/bin/sh">/bin/sh</option>
                                <option value="/usr/sbin/nologin">/usr/sbin/nologin</option>
                                <option value="/bin/false">/bin/false</option>
                            </select>
                        </div>

                        <div class="mb-3" id="add-reason-group" style="display:none;">
                            <label for="add-reason" class="form-label">申請理由 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="add-reason" rows="2"
                                placeholder="管理者への承認申請理由を入力してください"></textarea>
                            <div class="form-text text-warning">Admin以外は承認フロー経由で申請されます。</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="button" class="btn btn-primary" id="confirmAddUserBtn">追加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ユーザー詳細モーダル -->
    <div class="modal fade" id="userDetailModal" tabindex="-1" aria-labelledby="userDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userDetailModalLabel">ユーザー詳細</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="userDetailBody">
                    <p class="text-muted">読み込み中...</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="passwordModalLabel">パスワード変更</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="changePasswordForm">
                    <div class="modal-body">
                        <div id="changePasswordModalAlert"></div>
                        <p>対象ユーザー: <strong id="passwd-username">-</strong></p>
                        <input type="hidden" id="passwd-target">

                        <div class="mb-3">
                            <label for="new-password" class="form-label">新しいパスワード</label>
                            <input type="password" class="form-control" id="new-password" required minlength="8">
                        </div>

                        <div class="mb-3">
                            <label for="new-password-confirm" class="form-label">新しいパスワード（確認）</label>
                            <input type="password" class="form-control" id="new-password-confirm" required minlength="8">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                        <button type="button" class="btn btn-warning" id="confirmPasswordBtn">変更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="../js/env-config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar.js"></script>
<script>document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>renderSidebar('users')):renderSidebar('users');</script>
    <script src="../js/users.js"></script>
    <script>
        // 認証チェック
        const _token = localStorage.getItem('access_token');
        if (!_token) { window.location.href = 'dashboard.html'; }

        // ログアウト関数
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = 'dashboard.html';
        }

        // ユーザー名でテーブルを絞り込む（クライアントサイドフィルタ）
        function filterUserTable(query) {
            const tbody = document.getElementById('usersTableBody');
            if (!tbody) return;
            const q = query.trim().toLowerCase();
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const firstCell = row.querySelector('td');
                if (!firstCell) return;
                const name = firstCell.textContent.toLowerCase();
                row.style.display = (!q || name.includes(q)) ? '' : 'none';
            });
        }

        // タブ切替（Bootstrap tabs との橋渡し）
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = 'tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1);
                const tabEl = document.getElementById(tabId);
                if (tabEl) tabEl.classList.add('active');
            });
        });
    </script>
</body>
</html>
