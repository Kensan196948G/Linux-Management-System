<script>
// ===================================================================
// タブ管理
// ===================================================================
const TABS = ['tab-list', 'tab-detail', 'tab-logs', 'tab-images'];
let currentTab = 'tab-list';

function showTab(tabId) {
    TABS.forEach(t => {
        document.getElementById(t).classList.add('d-none');
        document.getElementById('tab-btn-' + t.replace('tab-', '')).classList.remove('active');
    });
    document.getElementById(tabId).classList.remove('d-none');
    document.getElementById('tab-btn-' + tabId.replace('tab-', '')).classList.add('active');
    if (currentTab === 'tab-logs' && tabId !== 'tab-logs') stopLogStream();
    currentTab = tabId;

    if (tabId === 'tab-images') loadImages();
}

function refreshCurrentTab() {
    if (currentTab === 'tab-list') loadContainers();
    else if (currentTab === 'tab-images') loadImages();
    else if (currentTab === 'tab-detail') {
        const name = document.getElementById('detail-input').value.trim();
        if (name) loadDetail();
    } else if (currentTab === 'tab-logs') {
        const name = document.getElementById('log-input').value.trim();
        if (name) loadLogs();
    }
}

// ===================================================================
// アラート
// ===================================================================
function showAlert(msg, type = 'danger') {
    const area = document.getElementById('alert-area');
    area.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${escHtml(msg)}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
}

function clearAlert() {
    document.getElementById('alert-area').innerHTML = '';
}

// ===================================================================
// ステータスバッジ
// ===================================================================
function statusBadge(status, state) {
    const s = (state || status || '').toLowerCase();
    let cls = 'status-stopped';
    if (s.includes('running') || s.includes('up')) cls = 'status-running';
    else if (s.includes('exited') || s.includes('exit')) cls = 'status-exited';
    else if (s.includes('paused')) cls = 'status-paused';
    else if (s.includes('created')) cls = 'status-created';
    return `<span class="status-badge ${cls}">${escHtml(status || state || '-')}</span>`;
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}

// ===================================================================
// ①コンテナ一覧
// ===================================================================
async function loadContainers() {
    clearAlert();
    document.getElementById('container-list-loading').classList.remove('d-none');
    document.getElementById('container-list-content').classList.add('d-none');
    document.getElementById('container-list-empty').classList.add('d-none');

    try {
        const data = await api.get('/containers/');

        // ランタイムバッジ
        if (data.runtime) {
            const badge = document.getElementById('runtime-badge');
            badge.textContent = data.runtime;
            badge.classList.remove('d-none');
        }

        document.getElementById('container-summary').textContent =
            `合計 ${data.total} 件 (起動中: ${data.running}, 停止: ${data.stopped})`;

        const tbody = document.getElementById('container-tbody');
        if (!data.containers || data.containers.length === 0) {
            document.getElementById('container-list-empty').classList.remove('d-none');
        } else {
            tbody.innerHTML = data.containers.map(c => `
                <tr>
                    <td><strong>${escHtml(c.name)}</strong><br><small class="text-muted">${escHtml(c.id)}</small></td>
                    <td>${escHtml(c.image)}</td>
                    <td>${statusBadge(c.status, c.state)}</td>
                    <td><small class="text-muted">—</small></td>
                    <td><small>${escHtml(c.ports || '—')}</small></td>
                    <td><small>${escHtml(c.created ? c.created.substring(0, 19) : '—')}</small></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <button class="btn btn-xs btn-outline-success" title="起動"
                                onclick="startContainer('${escHtml(c.name)}')">▶</button>
                            <button class="btn btn-xs btn-outline-danger" title="停止"
                                onclick="stopContainer('${escHtml(c.name)}')">■</button>
                            <button class="btn btn-xs btn-outline-warning" title="再起動"
                                onclick="restartContainer('${escHtml(c.name)}')">↺</button>
                            <button class="btn btn-xs btn-outline-secondary" title="ログ"
                                onclick="openLogs('${escHtml(c.name)}')">📜</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            document.getElementById('container-list-content').classList.remove('d-none');
        }
    } catch (err) {
        showAlert(err.message || 'コンテナ一覧の取得に失敗しました');
    } finally {
        document.getElementById('container-list-loading').classList.add('d-none');
    }
}

// ===================================================================
// コンテナ操作
// ===================================================================
async function startContainer(name) {
    clearAlert();
    try {
        const data = await api.post(`/containers/${encodeURIComponent(name)}/start`, {});
        showAlert(`✅ ${data.message || name + ' を起動しました'}`, 'success');
        setTimeout(loadContainers, 1000);
    } catch (err) {
        showAlert(err.message || '起動に失敗しました');
    }
}

async function stopContainer(name) {
    if (!confirm(`コンテナ "${name}" の停止を申請しますか？\n（承認フローが必要です）`)) return;
    clearAlert();
    try {
        const data = await api.post(`/containers/${encodeURIComponent(name)}/stop`, {});
        showAlert(`⏳ 停止申請を受け付けました。承認をお待ちください (ID: ${data.request_id})`, 'warning');
    } catch (err) {
        showAlert(err.message || '停止申請に失敗しました');
    }
}

async function restartContainer(name) {
    if (!confirm(`コンテナ "${name}" の再起動を申請しますか？\n（承認フローが必要です）`)) return;
    clearAlert();
    try {
        const data = await api.post(`/containers/${encodeURIComponent(name)}/restart`, {});
        showAlert(`⏳ 再起動申請を受け付けました。承認をお待ちください (ID: ${data.request_id})`, 'warning');
    } catch (err) {
        showAlert(err.message || '再起動申請に失敗しました');
    }
}

async function requestPrune() {
    if (!confirm('全停止コンテナの削除を申請しますか？\n（承認フローが必要です）')) return;
    clearAlert();
    try {
        const data = await api.post('/containers/prune', {});
        showAlert(`⏳ 削除申請を受け付けました (ID: ${data.request_id})`, 'warning');
    } catch (err) {
        showAlert(err.message || '削除申請に失敗しました');
    }
}

// ===================================================================
// ②コンテナ詳細
// ===================================================================
async function loadDetail() {
    const name = document.getElementById('detail-input').value.trim();
    if (!name) return;
    clearAlert();

    document.getElementById('detail-loading').classList.remove('d-none');
    document.getElementById('detail-content').classList.add('d-none');

    try {
        const data = await api.get(`/containers/${encodeURIComponent(name)}`);
        document.getElementById('detail-title').textContent = `コンテナ: ${name}`;

        const detail = Array.isArray(data.detail) ? data.detail[0] : data.detail;
        const body = document.getElementById('detail-body');

        if (typeof detail === 'object' && detail) {
            const rows = [
                ['ID', detail.Id || detail.ID || '—'],
                ['名前', detail.Name || name],
                ['ステータス', detail.State?.Status || '—'],
                ['イメージ', detail.Config?.Image || '—'],
                ['起動時刻', detail.State?.StartedAt || '—'],
                ['IPアドレス', detail.NetworkSettings?.IPAddress || '—'],
                ['コマンド', Array.isArray(detail.Config?.Cmd) ? detail.Config.Cmd.join(' ') : (detail.Config?.Cmd || '—')],
            ];
            body.innerHTML = rows.map(([k, v]) =>
                `<div class="d-flex mb-2"><div class="detail-key">${escHtml(k)}</div><div class="detail-value">${escHtml(String(v))}</div></div>`
            ).join('') +
            `<hr><details><summary class="text-muted small">JSON 全体を表示</summary>
                <pre style="font-size:11px;background:#f8fafc;padding:10px;border-radius:4px;overflow:auto">${escHtml(JSON.stringify(data.detail, null, 2))}</pre>
            </details>`;
        } else {
            body.innerHTML = `<pre style="font-size:12px">${escHtml(String(detail))}</pre>`;
        }

        document.getElementById('detail-content').classList.remove('d-none');
    } catch (err) {
        showAlert(err.message || '詳細の取得に失敗しました');
    } finally {
        document.getElementById('detail-loading').classList.add('d-none');
    }
}

// ===================================================================
// ③ログビューア
// ===================================================================
function openLogs(name) {
    showTab('tab-logs');
    document.getElementById('log-input').value = name;
    loadLogs();
}

async function loadLogs() {
    const name = document.getElementById('log-input').value.trim();
    if (!name) return;
    clearAlert();

    document.getElementById('log-loading').classList.remove('d-none');
    const viewer = document.getElementById('log-viewer');
    viewer.textContent = '読み込み中...';

    try {
        const data = await api.get(`/containers/${encodeURIComponent(name)}/logs`);
        viewer.textContent = data.logs || '(ログなし)';
        scrollLogsToBottom();
    } catch (err) {
        viewer.textContent = 'ログの取得に失敗しました: ' + (err.message || '');
        showAlert(err.message || 'ログの取得に失敗しました');
    } finally {
        document.getElementById('log-loading').classList.add('d-none');
    }
}

function scrollLogsToBottom() {
    const viewer = document.getElementById('log-viewer');
    viewer.scrollTop = viewer.scrollHeight;
}

// ===================================================================
// ③-b ログ SSE ストリーミング
// ===================================================================

let logStream = null;

function _logLineClass(line) {
    const u = line.toUpperCase();
    if (u.includes('ERROR') || u.includes('FATAL') || u.includes('CRIT')) return 'color:#f87171';
    if (u.includes('WARN')) return 'color:#fbbf24';
    if (u.includes('INFO') || u.includes('NOTICE')) return 'color:#4ade80';
    return '';
}

function appendLogLine(line) {
    const viewer = document.getElementById('log-viewer');
    const span = document.createElement('span');
    const style = _logLineClass(line);
    if (style) span.setAttribute('style', style);
    span.textContent = line + '\n';
    viewer.appendChild(span);
    scrollLogsToBottom();
}

function startLogStream() {
    const name = document.getElementById('log-input').value.trim();
    if (!name) { showAlert('コンテナ名を入力してください'); return; }
    stopLogStream();
    clearAlert();

    const token = localStorage.getItem('access_token') || '';
    const viewer = document.getElementById('log-viewer');
    viewer.textContent = '';

    document.getElementById('stream-start-btn').classList.add('d-none');
    document.getElementById('stream-stop-btn').classList.remove('d-none');
    const badge = document.getElementById('stream-status');
    badge.textContent = '接続中...';
    badge.className = 'badge bg-warning';
    badge.classList.remove('d-none');

    const url = `/api/containers/${encodeURIComponent(name)}/logs/stream?token=${encodeURIComponent(token)}&tail=200`;
    logStream = new EventSource(url);

    logStream.onmessage = function (e) {
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'start') {
                badge.textContent = 'ストリーミング中';
                badge.className = 'badge bg-success';
            } else if (data.type === 'log') {
                appendLogLine(data.line);
            } else if (data.type === 'heartbeat') {
                // no-op
            } else if (data.type === 'done') {
                badge.textContent = '完了';
                badge.className = 'badge bg-secondary';
                stopLogStream();
            } else if (data.type === 'error') {
                showAlert('ストリーミングエラー: ' + (data.message || ''));
                stopLogStream();
            }
        } catch (_) { /* ignore parse error */ }
    };

    logStream.onerror = function () {
        if (logStream && logStream.readyState === EventSource.CLOSED) {
            badge.textContent = '切断';
            badge.className = 'badge bg-danger';
            stopLogStream();
        }
    };
}

function stopLogStream() {
    if (logStream) {
        logStream.close();
        logStream = null;
    }
    document.getElementById('stream-start-btn').classList.remove('d-none');
    document.getElementById('stream-stop-btn').classList.add('d-none');
    const badge = document.getElementById('stream-status');
    if (badge.textContent === '接続中...' || badge.textContent === 'ストリーミング中') {
        badge.textContent = '停止';
        badge.className = 'badge bg-secondary';
    }
}

// ===================================================================
// ④イメージ一覧
// ===================================================================
async function loadImages() {
    document.getElementById('image-list-loading').classList.remove('d-none');
    document.getElementById('image-list-content').classList.add('d-none');
    document.getElementById('image-list-empty').classList.add('d-none');

    try {
        const data = await api.get('/containers/images');

        document.getElementById('image-summary').textContent =
            `合計 ${data.total} 件`;

        const cards = document.getElementById('image-cards');
        if (!data.images || data.images.length === 0) {
            document.getElementById('image-list-empty').classList.remove('d-none');
        } else {
            cards.innerHTML = data.images.map(img => `
                <div class="image-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="image-name">${escHtml(img.repository)}:<span style="color:#0891b2">${escHtml(img.tag)}</span></div>
                            <div class="image-meta">
                                ID: ${escHtml(img.id)} &nbsp;|&nbsp;
                                サイズ: ${escHtml(img.size)} &nbsp;|&nbsp;
                                作成: ${escHtml(img.created ? img.created.substring(0, 10) : '—')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('image-list-content').classList.remove('d-none');
        }
    } catch (err) {
        showAlert(err.message || 'イメージ一覧の取得に失敗しました');
    } finally {
        document.getElementById('image-list-loading').classList.add('d-none');
    }
}

// ===================================================================
// 初期化
// ===================================================================
document.addEventListener('DOMContentLoaded', async function () {
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = window.location.pathname.replace(/[^/]*$/, '') + 'index.html';
        return;
    }
    api.setToken(token);
    loadContainers();
});
</script>
