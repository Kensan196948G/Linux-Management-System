<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL - Linux Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link href="../vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-card { background: white; border-radius: 8px; border: 1px solid #e5e7eb; padding: 20px; margin-bottom: 16px; }
        .status-title { font-size: 16px; font-weight: bold; color: #111827; margin-bottom: 14px; }
        .badge-active { background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-inactive { background: #fee2e2; color: #991b1b; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-unavail { background: #f3f4f6; color: #6b7280; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-ok { background: #d1fae5; color: #065f46; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .badge-error { background: #fee2e2; color: #991b1b; border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
        .raw-output { background: #1e293b; color: #e2e8f0; border-radius: 6px; padding: 14px; font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        .metric-val { font-size: 22px; font-weight: bold; color: #1e293b; }
        .metric-label { font-size: 12px; color: #6b7280; }
        .unavail-notice { background: #fefce8; border: 1px solid #fde047; border-radius: 8px; padding: 12px; color: #713f12; font-size: 13px; }
        .nav-tabs .nav-link.active { color: #2563eb; font-weight: 600; border-bottom: 2px solid #2563eb; background: none; }
        .nav-tabs .nav-link { color: #6b7280; }
    </style>
<script src="../js/theme.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar-container"></aside>

    <div class="main-content">
        <div class="container-fluid py-4">
            <!-- ヘッダー -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h1 class="h4 mb-0">🐘 PostgreSQL</h1>
                    <p class="text-muted small mb-0">PostgreSQL データベースサーバの状態・DB一覧・ユーザー・接続状況・設定・ログ</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="loadAll()">🔄 更新</button>
                </div>
            </div>

            <!-- ステータスカード -->
            <div class="row g-3 mb-3">
                <div class="col-md-3">
                    <div class="status-card text-center">
                        <div class="metric-label mb-1">サービス状態</div>
                        <div id="svcActive" class="metric-val mb-1">-</div>
                        <span id="badgeActive" class="badge-unavail">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="status-card text-center">
                        <div class="metric-label mb-1">自動起動</div>
                        <div id="svcEnabled" class="metric-val mb-1">-</div>
                        <span id="badgeEnabled" class="badge-unavail">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="status-card text-center">
                        <div class="metric-label mb-1">接続受付</div>
                        <div id="svcReady" class="metric-val mb-1">-</div>
                        <span id="badgeReady" class="badge-unavail">-</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="status-card text-center">
                        <div class="metric-label mb-1">バージョン</div>
                        <div id="pgVersion" class="metric-val" style="font-size:11px; word-break:break-all;">-</div>
                    </div>
                </div>
            </div>

            <!-- タブ -->
            <ul class="nav nav-tabs mb-3" id="pgTabs">
                <li class="nav-item"><a class="nav-link active" href="#" onclick="return switchTab('databases', this)">🗄️ データベース</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="return switchTab('users', this)">👤 ユーザー</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="return switchTab('activity', this)">🔗 接続状況</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="return switchTab('config', this)">⚙️ 設定</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="return switchTab('logs', this)">📋 ログ</a></li>
            </ul>

            <!-- データベース一覧 -->
            <div id="tabDatabases">
                <div class="status-card">
                    <div class="status-title">🗄️ データベース一覧</div>
                    <div id="databasesContent"><div class="text-center text-muted py-3">読み込み中...</div></div>
                </div>
            </div>

            <!-- ユーザー/ロール一覧 -->
            <div id="tabUsers" style="display:none;">
                <div class="status-card">
                    <div class="status-title">👤 ユーザー/ロール一覧</div>
                    <div id="usersContent"><div class="text-center text-muted py-3">読み込み中...</div></div>
                </div>
            </div>

            <!-- 接続状況 -->
            <div id="tabActivity" style="display:none;">
                <div class="status-card">
                    <div class="status-title">🔗 現在の接続状況 <span id="connCount" class="badge-ok" style="display:none;"></span></div>
                    <div id="activityContent"><div class="text-center text-muted py-3">読み込み中...</div></div>
                </div>
            </div>

            <!-- 設定 -->
            <div id="tabConfig" style="display:none;">
                <div class="status-card">
                    <div class="status-title">⚙️ 主要設定パラメータ</div>
                    <div id="configContent"><div class="text-center text-muted py-3">読み込み中...</div></div>
                </div>
            </div>

            <!-- ログ -->
            <div id="tabLogs" style="display:none;">
                <div class="status-card">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <div class="status-title mb-0">📋 ログ</div>
                        <div class="d-flex gap-2 align-items-center">
                            <label class="small text-muted mb-0">行数:</label>
                            <select id="logLines" class="form-select form-select-sm" style="width:80px;">
                                <option value="50" selected>50</option>
                                <option value="100">100</option>
                                <option value="200">200</option>
                            </select>
                            <button class="btn btn-outline-secondary btn-sm" onclick="loadLogs()">取得</button>
                        </div>
                    </div>
                    <div id="logsContent"><div class="text-center text-muted py-3">読み込み中...</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="../js/env-config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>renderSidebar('postgresql')):renderSidebar('postgresql');</script>
<script>
const API_BASE = '/api';
const TABS = ['databases', 'users', 'activity', 'config', 'logs'];

function getHeaders() {
    return { 'Authorization': 'Bearer ' + (localStorage.getItem('access_token') || ''), 'Content-Type': 'application/json' };
}

async function apiFetch(path) {
    const r = await fetch(API_BASE + path, { headers: getHeaders() });
    if (r.status === 401 || r.status === 403) {
        window.location.href = window.location.pathname.replace(/[^/]*$/, '') + 'index.html';
        return null;
    }
    return r.ok ? r.json() : null;
}

function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderUnavail(msg) {
    return `<div class="unavail-notice">⚠️ ${escHtml(msg || 'PostgreSQL がインストールされていないか、利用できません。')}</div>`;
}

function renderRaw(text) {
    if (!text) return '<div class="text-muted small">データなし</div>';
    return `<div class="raw-output">${escHtml(text)}</div>`;
}

function switchTab(name, el) {
    document.querySelectorAll('#pgTabs .nav-link').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    TABS.forEach(t => {
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = (t === name) ? '' : 'none';
    });
    if (name === 'databases') loadDatabases();
    else if (name === 'users') loadUsers();
    else if (name === 'activity') loadActivity();
    else if (name === 'config') loadConfig();
    else if (name === 'logs') loadLogs();
    return false;
}

async function loadStatus() {
    const d = await apiFetch('/postgresql/status');
    if (!d) return;
    if (d.status === 'unavailable') {
        document.getElementById('svcActive').textContent = '-';
        document.getElementById('svcEnabled').textContent = '-';
        document.getElementById('svcReady').textContent = '-';
        document.getElementById('pgVersion').textContent = '-';
        ['badgeActive','badgeEnabled','badgeReady'].forEach(id => {
            const el = document.getElementById(id);
            el.className = 'badge-unavail';
            el.textContent = '未インストール';
        });
        return;
    }
    const active = d.active || 'unknown';
    const enabled = d.enabled || 'unknown';
    const ready = d.ready || 'unknown';
    document.getElementById('svcActive').textContent = active;
    document.getElementById('svcEnabled').textContent = enabled;
    document.getElementById('svcReady').textContent = ready === 'accepting connections' ? '接続中' : ready;
    document.getElementById('pgVersion').textContent = d.version || '-';

    const bActive = document.getElementById('badgeActive');
    bActive.className = active === 'active' ? 'badge-active' : 'badge-inactive';
    bActive.textContent = active;

    const bEnabled = document.getElementById('badgeEnabled');
    bEnabled.className = enabled === 'enabled' ? 'badge-active' : 'badge-inactive';
    bEnabled.textContent = enabled;

    const bReady = document.getElementById('badgeReady');
    bReady.className = ready === 'accepting connections' ? 'badge-active' : 'badge-inactive';
    bReady.textContent = ready;
}

async function loadDatabases() {
    const el = document.getElementById('databasesContent');
    el.innerHTML = '<div class="text-center text-muted py-3">読み込み中...</div>';
    const d = await apiFetch('/postgresql/databases');
    if (!d) return;
    if (d.status === 'unavailable') { el.innerHTML = renderUnavail(d.message); return; }
    el.innerHTML = renderRaw(d.databases_raw);
}

async function loadUsers() {
    const el = document.getElementById('usersContent');
    el.innerHTML = '<div class="text-center text-muted py-3">読み込み中...</div>';
    const d = await apiFetch('/postgresql/users');
    if (!d) return;
    if (d.status === 'unavailable') { el.innerHTML = renderUnavail(d.message); return; }
    el.innerHTML = renderRaw(d.users_raw);
}

async function loadActivity() {
    const el = document.getElementById('activityContent');
    el.innerHTML = '<div class="text-center text-muted py-3">読み込み中...</div>';
    const d = await apiFetch('/postgresql/activity');
    if (!d) return;
    if (d.status === 'unavailable') { el.innerHTML = renderUnavail(d.message); return; }
    const countEl = document.getElementById('connCount');
    if (d.connection_count !== undefined) {
        countEl.style.display = '';
        countEl.textContent = `${d.connection_count} 接続`;
    }
    el.innerHTML = renderRaw(d.activity_raw);
}

async function loadConfig() {
    const el = document.getElementById('configContent');
    el.innerHTML = '<div class="text-center text-muted py-3">読み込み中...</div>';
    const d = await apiFetch('/postgresql/config');
    if (!d) return;
    if (d.status === 'unavailable') { el.innerHTML = renderUnavail(d.message); return; }
    el.innerHTML = renderRaw(d.config_raw);
}

async function loadLogs() {
    const el = document.getElementById('logsContent');
    el.innerHTML = '<div class="text-center text-muted py-3">読み込み中...</div>';
    const lines = document.getElementById('logLines').value || '50';
    const d = await apiFetch(`/postgresql/logs?lines=${encodeURIComponent(lines)}`);
    if (!d) return;
    if (d.status === 'unavailable') { el.innerHTML = renderUnavail(d.message); return; }
    el.innerHTML = renderRaw(d.logs);
}

async function loadAll() {
    await loadStatus();
    loadDatabases();
}

document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('access_token')) {
        window.location.href = window.location.pathname.replace(/[^/]*$/, '') + 'index.html';
        return;
    }
    loadAll();
});
</script>
</body>
</html>
