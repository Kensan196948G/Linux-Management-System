<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【開発】Linux Management System - ログイン</title>
    <link rel="stylesheet" href="../css/style.css">
<script src="../js/theme.js"></script>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <!-- ログインカード -->
    <div class="card" style="max-width: 450px; width: 100%; margin: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">🖥️ Linux管理運用システム</h1>
            <p style="color: var(--text-secondary);">
                <span class="env-badge dev">【開発】</span>
            </p>
        </div>

        <h2 class="card-title" style="text-align: center;">ログイン</h2>

        <div id="login-alerts"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">メールアドレス</label>
                <input type="email" class="form-input" id="email" value="operator@example.com" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">パスワード</label>
                <input type="password" class="form-input" id="password" value="operator123" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">ログイン</button>
        </form>

        <div style="margin-top: 1.5rem; padding: 1rem; background-color: #f1f5f9; border-radius: 6px;">
            <p style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 0.5rem;">開発環境用デモアカウント:</p>
            <ul style="font-size: 0.875rem; color: var(--text-secondary); margin: 0; list-style: none; padding: 0;">
                <li style="padding: 0.25rem 0;">👁️ viewer@example.com / viewer123 (Viewer)</li>
                <li style="padding: 0.25rem 0;">⚙️ operator@example.com / operator123 (Operator)</li>
                <li style="padding: 0.25rem 0;">🔧 admin@example.com / admin123 (Admin)</li>
            </ul>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../js/api.js"></script>
    <script src="../js/env-config.js"></script>
    <script>
        // DOMContentLoadedイベントを待つ（CRITICAL BUG FIX）
        document.addEventListener('DOMContentLoaded', () => {
            console.log('=== Login Page Initialized ===');

            // 古いトークンがあればクリア（期限切れ対策）
            // ただし、直前にログインした場合（リダイレクトバック）は保持
            const existingToken = localStorage.getItem('access_token');
            if (existingToken) {
                console.log('Found existing token, checking validity...');
                // すぐにログイン画面に戻ってきた場合は、トークンをクリア
                // （期限切れまたは無効なトークン）
                const lastLoginTime = sessionStorage.getItem('last_login_time');
                const now = Date.now();
                if (!lastLoginTime || (now - parseInt(lastLoginTime)) > 5000) {
                    // 5秒以上経過している、または初回訪問ならクリア
                    console.log('Clearing old/expired token...');
                    localStorage.removeItem('access_token');
                } else {
                    console.log('Recent login detected, keeping token');
                }
            } else {
                console.log('No existing token found');
            }

            // ログインフォームの処理
            document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertsEl = document.getElementById('login-alerts');
            const submitBtn = event.target.querySelector('button[type="submit"]');

            // ボタンを無効化
            submitBtn.disabled = true;
            submitBtn.textContent = 'ログイン中...';

            try {
                console.log('Attempting login for:', email);

                // ログイン
                const result = await api.login(email, password);

                console.log('Login successful:', result);

                // アラート表示
                alertsEl.innerHTML = '<div class="alert alert-success">✅ ログインしました。ダッシュボードに移動します...</div>';

                // LocalStorageへの保存を確実にするため、少し待機（Edge対策）
                console.log('Verifying token storage...');
                const storedToken = localStorage.getItem('access_token');
                if (!storedToken) {
                    console.error('❌ Token not saved to localStorage!');
                    alertsEl.innerHTML = '<div class="alert alert-error">❌ トークンの保存に失敗しました。再度お試しください。</div>';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ログイン';
                    return;
                }
                console.log('✅ Token verified in localStorage (first 50 chars):', storedToken.substring(0, 50));

                // ログイン時刻を記録（リダイレクトバック検知用）
                sessionStorage.setItem('last_login_time', Date.now().toString());
                // ユーザーメール/名前をlocalStorageに保存（サイドバー表示用）
                localStorage.setItem('user_email', email);
                console.log('✅ Login timestamp saved to sessionStorage');

                // ダッシュボードにリダイレクト（Edge対策で1.5秒に延長）
                setTimeout(() => {
                    console.log('Redirecting to dashboard...');
                    // Edge対策: 強制的にページを完全リロード
                    window.location.replace(window.location.pathname.replace('index.html','') + 'dashboard.html');
                }, 1500);

            } catch (error) {
                console.error('Login failed:', error);
                alertsEl.innerHTML = `<div class="alert alert-error">❌ ログインに失敗しました: ${error.message || 'ネットワークエラー'}</div>`;

                // ボタンを再度有効化
                submitBtn.disabled = false;
                submitBtn.textContent = 'ログイン';
            }
        });

        // 既にログイン済みの場合はダッシュボードにリダイレクト
        if (api.isAuthenticated()) {
            console.log('Already authenticated, checking token validity...');
            api.getCurrentUser().then((user) => {
                console.log('Token valid, redirecting to dashboard...', user);
                window.location.href = window.location.pathname.replace('index.html','') + 'dashboard.html';
            }).catch((error) => {
                // 401のみトークンクリア（ネットワークエラーはトークン保持）
                if (error && error.status === 401) {
                    console.warn('Token expired, clearing...', error);
                    api.clearToken();
                    window.location.reload();
                } else {
                    // ネットワークエラー等: ダッシュボードへ遷移（オフライン対応）
                    console.warn('Network error on auth check, proceeding to dashboard:', error);
                    window.location.href = window.location.pathname.replace('index.html','') + 'dashboard.html';
                }
            });
        } else {
            console.log('Not authenticated, showing login form');
        }
        }); // End of DOMContentLoaded
    </script>
</body>
</html>
