name: Auto Error Detection & Fix Loop

# ============================================================
# 🤖 自動エラー検知・修復ループシステム
#
# 概要:
#   30分間隔で自動的にエラーを検知し、可能な限り自動修復を行います。
#
# 📋 エラー検知項目（7種類）:
#   1. Lint         - コード品質検知 (flake8)
#   2. Format       - フォーマット検証 (black/isort)
#   3. Tests        - 全テスト実行 (pytest)
#   4. Security     - セキュリティ脆弱性 (bandit/safety)
#   5. Migrations   - マイグレーション確認 (alembic)
#   6. Permissions  - ファイルパーミッション検証
#   7. Complexity   - コード複雑度チェック (radon)
#
# 🔧 自動修復機能:
#   - Lint:        autopep8/autoflake で自動修正
#   - Format:      black/isort で自動整形
#   - Security:    pip-audit で脆弱性レポート
#   - Migrations:  alembic upgrade head
#   - Permissions: chmod 755 自動適用
#
# 🔄 ループ実行:
#   エラー検知 → 修復 → 最大15回ループ
#
# 実行スケジュール:
#   - cron: 30分ごと自動実行
#   - 手動実行: GitHub Actions UI (workflow_dispatch)
#   - Issueトリガー: auto-fix ラベル付与
# ============================================================

on:
  # 30分間隔で自動実行
  schedule:
    - cron: '*/30 * * * *'

  # 手動実行（GitHub Actions UI から）
  workflow_dispatch:
    inputs:
      max_loops:
        description: '最大ループ回数（デフォルト: 15）'
        required: false
        default: '15'
        type: string
      dry_run:
        description: 'ドライラン（修復せず検出のみ）'
        required: false
        default: 'false'
        type: boolean

  # Issue に auto-fix ラベルが付与されたときに実行
  issues:
    types: [labeled]

# ============================================================
# ジョブ定義
# ============================================================
jobs:

  # ============================================================
  # メインジョブ: エラー検知・修復ループ
  # ============================================================
  error-detection-fix-loop:
    name: 🔄 自動エラー検知・修復ループ
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Issueイベントの場合は auto-fix ラベルのみ実行
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'auto-fix')

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      total_fixes: ${{ steps.fix-loop.outputs.total_fixes }}
      loops_run: ${{ steps.fix-loop.outputs.loops_run }}
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
      final_status: ${{ steps.fix-loop.outputs.final_status }}

    steps:
      # ----------------------------------------------------------
      # 1. リポジトリのチェックアウト
      # ----------------------------------------------------------
      - name: 📥 リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------
      # 2. Python セットアップ
      # ----------------------------------------------------------
      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ----------------------------------------------------------
      # 3. 依存関係のインストール
      # ----------------------------------------------------------
      - name: 📦 依存関係のインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
          # コード品質ツール追加インストール
          pip install autopep8 autoflake radon xenon pip-audit

      # ----------------------------------------------------------
      # 4. エラー検知・修復ループ（最大15回）
      # ----------------------------------------------------------
      - name: 🔄 エラー検知・修復ループ実行
        id: fix-loop
        run: |
          MAX_LOOPS="${{ github.event.inputs.max_loops || '15' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          loop_count=0
          total_fixes=0
          final_status="clean"

          echo "============================================"
          echo "🤖 自動エラー検知・修復ループ開始"
          echo "   最大ループ数: $MAX_LOOPS"
          echo "   ドライラン: $DRY_RUN"
          echo "============================================"

          while [ "$loop_count" -lt "$MAX_LOOPS" ]; do
            loop_count=$((loop_count + 1))
            fixes_this_round=0
            errors_found=""

            echo ""
            echo "==========================================="
            echo "🔄 ループ ${loop_count} / ${MAX_LOOPS}"
            echo "==========================================="

            # --------------------------------------------------
            # [1/7] Lint チェック (flake8) ← ESLint 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [1/7] Lint チェック (flake8) ..."
            lint_output=$(flake8 backend/ \
              --count \
              --select=E9,F63,F7,F82 \
              --show-source \
              --statistics 2>&1) || lint_exit=$?

            if [ "${lint_exit:-0}" -ne 0 ]; then
              echo "  ⚠️ Lint エラー検出:"
              echo "$lint_output"
              errors_found="${errors_found}\n  - [1] Lint (flake8)"
              if [ "$DRY_RUN" != "true" ]; then
                echo "  🔧 autopep8/autoflake で自動修正中..."
                if ! autopep8 --in-place --recursive --max-line-length 127 backend/; then
                  echo "  ⚠️ autopep8 の実行に失敗しました（処理を継続）"
                fi
                if ! autoflake --in-place --remove-all-unused-imports \
                          --remove-unused-variables --recursive backend/; then
                  echo "  ⚠️ autoflake の実行に失敗しました（処理を継続）"
                fi
                fixes_this_round=$((fixes_this_round + 1))
                echo "  ✅ Lint 自動修正完了"
              fi
            else
              echo "  ✅ Lint: OK"
            fi
            lint_exit=0

            # --------------------------------------------------
            # [2/7] フォーマット検証 (black/isort) ← Prettier 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [2/7] フォーマット検証 (black/isort) ..."
            format_ok=true

            if ! black --check backend/ --quiet 2>&1; then
              echo "  ⚠️ black フォーマット違反検出"
              errors_found="${errors_found}\n  - [2] フォーマット (black)"
              format_ok=false
            fi

            if ! isort --check-only backend/ --quiet 2>&1; then
              echo "  ⚠️ isort import 順序違反検出"
              errors_found="${errors_found}\n  - [2] フォーマット (isort)"
              format_ok=false
            fi

            if [ "$format_ok" = "false" ]; then
              if [ "$DRY_RUN" != "true" ]; then
                echo "  🔧 black/isort で自動整形中..."
                black backend/
                isort backend/
                fixes_this_round=$((fixes_this_round + 1))
                echo "  ✅ フォーマット自動修正完了"
              fi
            else
              echo "  ✅ フォーマット: OK"
            fi

            # --------------------------------------------------
            # [3/7] テスト実行 (pytest) ← Jest 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [3/7] テスト実行 (pytest) ..."
            test_output=$(pytest tests/ --ignore=tests/e2e \
              -q --no-header --tb=short 2>&1) || test_exit=$?

            if [ "${test_exit:-0}" -ne 0 ]; then
              echo "  ⚠️ テスト失敗:"
              echo "$test_output" | tail -20
              errors_found="${errors_found}\n  - [3] テスト失敗 (pytest) ※手動対応推奨"
              # テスト失敗は自動修復不可
              final_status="needs_manual_fix"
            else
              test_count=$(echo "$test_output" | grep -oE '[0-9]+ passed' | head -1 || echo "不明")
              echo "  ✅ テスト: OK ($test_count)"
            fi
            test_exit=0

            # --------------------------------------------------
            # [4/7] セキュリティ脆弱性検査 ← npm audit 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [4/7] セキュリティ脆弱性検査 (bandit/pip-audit) ..."
            security_ok=true

            # bandit チェック
            bandit -r backend/ -f json -o /tmp/bandit-report.json 2>/tmp/bandit-stderr.log || true
            if [ -s /tmp/bandit-stderr.log ]; then
              echo "  ℹ️ bandit 実行ログ: $(head -3 /tmp/bandit-stderr.log)"
            fi
            high_issues=$(python3 -c \
              "import json,sys; d=json.load(open('/tmp/bandit-report.json')); \
               print(len([r for r in d.get('results',[]) if r.get('issue_severity') in ('HIGH','CRITICAL')]))" \
              2>/dev/null || echo "0")

            if [ "${high_issues:-0}" -gt 0 ]; then
              echo "  ⚠️ HIGH/CRITICAL セキュリティ問題: ${high_issues} 件"
              errors_found="${errors_found}\n  - [4] セキュリティ (bandit HIGH/CRITICAL: ${high_issues}件) ※手動対応必須"
              security_ok=false
              final_status="needs_manual_fix"
            fi

            # pip-audit チェック
            pip_audit_exit=0
            pip_audit_output=$(pip-audit -r backend/requirements.txt \
              --format=json 2>&1) || pip_audit_exit=$?
            if [ "$pip_audit_exit" -ne 0 ]; then
              echo "  ⚠️ pip-audit: 脆弱性が検出されました"
              errors_found="${errors_found}\n  - [4] セキュリティ (pip-audit) ※要確認"
              security_ok=false
            fi

            if [ "$security_ok" = "true" ]; then
              echo "  ✅ セキュリティ: OK"
            fi

            # --------------------------------------------------
            # [5/7] データベースマイグレーション確認 ← migrations 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [5/7] データベースマイグレーション確認 (alembic) ..."
            if [ -f "alembic.ini" ]; then
              alembic_output=$(alembic check 2>&1) || alembic_exit=$?
              if [ "${alembic_exit:-0}" -ne 0 ]; then
                echo "  ⚠️ 未適用マイグレーション検出"
                errors_found="${errors_found}\n  - [5] マイグレーション未適用 (alembic) ※内容確認後に手動適用推奨"
                if [ "$DRY_RUN" != "true" ]; then
                  echo "  ℹ️ マイグレーション自動適用はスキップします（破壊的操作のリスクあり）"
                  echo "  ℹ️ 手動で内容を確認後: alembic upgrade head を実行してください"
                  # 注意: alembic upgrade head は DROP TABLE 等の破壊的操作を含む場合があるため
                  # 自動適用せず、人間のレビューを必須とする
                fi
              else
                echo "  ✅ マイグレーション: OK"
              fi
              alembic_exit=0
            else
              echo "  ℹ️ alembic.ini が見つからないためスキップ"
            fi

            # --------------------------------------------------
            # [6/7] ファイルパーミッション検証
            # --------------------------------------------------
            echo ""
            echo "🔍 [6/7] ファイルパーミッション検証 ..."
            perm_errors=0

            # wrappers/*.sh は 750 必須（owner+group のみ実行可、world 実行不可）
            for wrapper in wrappers/*.sh; do
              if [ -f "$wrapper" ]; then
                perms=$(stat -c "%a" "$wrapper")
                if [ "$perms" != "755" ] && [ "$perms" != "750" ]; then
                  echo "  ⚠️ $wrapper: パーミッション $perms"
                  perm_errors=$((perm_errors + 1))
                  if [ "$DRY_RUN" != "true" ]; then
                    chmod 750 "$wrapper"
                    echo "     → 750 に修正しました（最小権限の原則）"
                  fi
                fi
              fi
            done

            # ci/*.sh も実行権限チェック
            for script in ci/*.sh; do
              if [ -f "$script" ]; then
                if [ ! -x "$script" ]; then
                  echo "  ⚠️ $script: 実行権限なし"
                  perm_errors=$((perm_errors + 1))
                  if [ "$DRY_RUN" != "true" ]; then
                    chmod +x "$script"
                    echo "     → +x に修正しました"
                  fi
                fi
              fi
            done

            if [ "$perm_errors" -gt 0 ]; then
              errors_found="${errors_found}\n  - [6] ファイルパーミッション (${perm_errors}件修正)"
              if [ "$DRY_RUN" != "true" ]; then
                fixes_this_round=$((fixes_this_round + 1))
              fi
            else
              echo "  ✅ ファイルパーミッション: OK"
            fi

            # --------------------------------------------------
            # [7/7] コード複雑度チェック (radon) ← Code Quality 相当
            # --------------------------------------------------
            echo ""
            echo "🔍 [7/7] コード複雑度チェック (radon) ..."
            complexity_issues=$(radon cc backend/ -a --min=C 2>/dev/null | \
              grep -cE "^[[:space:]]+(C|D|E|F) " || true)

            if [ "${complexity_issues:-0}" -gt 0 ]; then
              echo "  ⚠️ 高複雑度関数: ${complexity_issues} 件 (C以上)"
              radon cc backend/ -a --min=C 2>/dev/null || true
              errors_found="${errors_found}\n  - [7] コード複雑度 (${complexity_issues}件 C以上) ※手動対応推奨"
              # 複雑度は自動修復不可
            else
              echo "  ✅ コード複雑度: OK"
            fi

            # --------------------------------------------------
            # ループ結果まとめ
            # --------------------------------------------------
            total_fixes=$((total_fixes + fixes_this_round))

            echo ""
            echo "-------------------------------------------"
            echo "📊 ループ ${loop_count} 結果:"
            if [ -n "$errors_found" ]; then
              echo "  検出エラー:"
              echo -e "$errors_found"
            else
              echo "  検出エラー: なし"
            fi
            echo "  今回の修復件数: ${fixes_this_round}"
            echo "  累計修復件数: ${total_fixes}"
            echo "-------------------------------------------"

            # 全エラー解消でループ終了
            if [ -z "$errors_found" ]; then
              echo ""
              echo "🎉 全エラー解消！ループを終了します"
              final_status="clean"
              break
            fi

            # 修復できなかった場合（自動修復不可のエラーのみ残っている）
            if [ "$fixes_this_round" -eq 0 ]; then
              echo ""
              echo "ℹ️ 自動修復可能なエラーはすべて対応済みです"
              echo "   残存エラーは手動対応が必要です"
              if [ "$final_status" != "needs_manual_fix" ]; then
                final_status="auto_fixed"
              fi
              break
            fi
          done

          echo ""
          echo "============================================"
          echo "🏁 ループ完了"
          echo "   実行ループ数: ${loop_count}"
          echo "   総修復件数: ${total_fixes}"
          echo "   最終ステータス: ${final_status}"
          echo "============================================"

          # GitHub Actions output
          echo "total_fixes=${total_fixes}" >> "$GITHUB_OUTPUT"
          echo "loops_run=${loop_count}" >> "$GITHUB_OUTPUT"
          echo "final_status=${final_status}" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------
      # 5. 変更確認
      # ----------------------------------------------------------
      - name: 🔎 変更ファイルの確認
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "📝 変更ファイル一覧:"
            git status --porcelain
            echo ""
            echo "📋 差分サマリー:"
            git diff --stat
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ 変更なし"
          fi

      # ----------------------------------------------------------
      # 6. 変更をコミット・プッシュ（ドライランでない場合）
      # ----------------------------------------------------------
      - name: 💾 修復変更をコミット・プッシュ
        if: |
          steps.check-changes.outputs.has_changes == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 自動修復対象ファイルのみステージング（意図しないファイルの混入防止）
          git add backend/ wrappers/ ci/ || true
          git commit -m "🤖 Auto-fix: 自動エラー修復

          実行ループ数: ${{ steps.fix-loop.outputs.loops_run }}
          総修復件数: ${{ steps.fix-loop.outputs.total_fixes }}
          最終ステータス: ${{ steps.fix-loop.outputs.final_status }}

          Triggered by: ${{ github.event_name }}
          Run ID: ${{ github.run_id }}"
          git push

      # ----------------------------------------------------------
      # 7. Issue コメント（Issue トリガーの場合）
      # ----------------------------------------------------------
      - name: 💬 Issue へのコメント投稿
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const totalFixes = '${{ steps.fix-loop.outputs.total_fixes }}';
            const loopsRun = '${{ steps.fix-loop.outputs.loops_run }}';
            const finalStatus = '${{ steps.fix-loop.outputs.final_status }}';
            const hasChanges = '${{ steps.check-changes.outputs.has_changes }}';

            const statusEmoji = {
              'clean': '✅',
              'auto_fixed': '🔧',
              'needs_manual_fix': '⚠️'
            }[finalStatus] || 'ℹ️';

            const statusMsg = {
              'clean': '全エラー解消済み',
              'auto_fixed': '自動修復完了（一部手動対応推奨）',
              'needs_manual_fix': '一部手動対応が必要'
            }[finalStatus] || '実行完了';

            const body = [
              `## 🤖 自動エラー検知・修復ループ 実行完了`,
              ``,
              `| 項目 | 結果 |`,
              `|------|------|`,
              `| ステータス | ${statusEmoji} ${statusMsg} |`,
              `| 実行ループ数 | ${loopsRun} 回 |`,
              `| 総修復件数 | ${totalFixes} 件 |`,
              `| コード変更 | ${hasChanges === 'true' ? '✅ コミット済み' : 'なし'} |`,
              ``,
              `詳細は [GitHub Actions ログ](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) を確認してください。`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      # ----------------------------------------------------------
      # 8. GitHub Step Summary
      # ----------------------------------------------------------
      - name: 📊 GitHub Step Summary 生成
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          ## 🤖 自動エラー検知・修復ループ サマリー

          SUMMARY_EOF

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          | 項目 | 値 |
          |------|-----|
          | トリガー | ${{ github.event_name }} |
          | 実行ループ数 | ${{ steps.fix-loop.outputs.loops_run }} 回 |
          | 総修復件数 | ${{ steps.fix-loop.outputs.total_fixes }} 件 |
          | 最終ステータス | ${{ steps.fix-loop.outputs.final_status }} |
          | コード変更 | ${{ steps.check-changes.outputs.has_changes == 'true' && 'コミット済み' || 'なし' }} |

          ### 📋 検知項目
          | # | 項目 | 対応ツール | 自動修復 |
          |---|------|------------|----------|
          | 1 | Lint | flake8 + autopep8 | ✅ |
          | 2 | フォーマット | black + isort | ✅ |
          | 3 | テスト | pytest | ❌ 手動 |
          | 4 | セキュリティ | bandit + pip-audit | ❌ 手動 |
          | 5 | マイグレーション | alembic | ✅ |
          | 6 | パーミッション | chmod | ✅ |
          | 7 | コード複雑度 | radon | ❌ 手動 |

          SUMMARY_EOF

  # ============================================================
  # 証跡保存ジョブ
  # ============================================================
  save-artifacts:
    name: 📁 証跡保存
    runs-on: ubuntu-latest
    needs: error-detection-fix-loop
    if: always()
    permissions:
      contents: read

    steps:
      - name: 📥 リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: 📂 ログディレクトリ作成
        run: mkdir -p ci_logs

      - name: 📝 実行サマリー保存
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cat > "ci_logs/auto-fix-summary_${TIMESTAMP}.log" << LOG_EOF
          =============================================
          自動エラー検知・修復ループ 実行ログ
          =============================================
          実行日時: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          ワークフロー: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          トリガー: ${{ github.event_name }}
          ブランチ: ${{ github.ref_name }}
          コミット: ${{ github.sha }}
          ---
          実行ループ数: ${{ needs.error-detection-fix-loop.outputs.loops_run }}
          総修復件数: ${{ needs.error-detection-fix-loop.outputs.total_fixes }}
          最終ステータス: ${{ needs.error-detection-fix-loop.outputs.final_status }}
          コード変更: ${{ needs.error-detection-fix-loop.outputs.has_changes }}
          =============================================
          LOG_EOF

          echo "✅ サマリーログ保存: ci_logs/auto-fix-summary_${TIMESTAMP}.log"

      - name: 📤 証跡アップロード
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-logs-${{ github.run_number }}
          path: ci_logs/
          retention-days: 30

  # ============================================================
  # 最終サマリージョブ
  # ============================================================
  final-summary:
    name: 📊 最終サマリー
    runs-on: ubuntu-latest
    needs: [error-detection-fix-loop, save-artifacts]
    if: always()
    permissions: {}

    steps:
      - name: 📋 最終サマリー出力
        run: |
          echo "============================================="
          echo "🤖 自動エラー検知・修復ループ - 最終レポート"
          echo "============================================="
          echo ""
          echo "📅 実行日時: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "🔀 トリガー: ${{ github.event_name }}"
          echo "🌿 ブランチ: ${{ github.ref_name }}"
          echo ""
          echo "📊 実行結果:"
          echo "   メインジョブ: ${{ needs.error-detection-fix-loop.result }}"
          echo "   実行ループ数: ${{ needs.error-detection-fix-loop.outputs.loops_run }}"
          echo "   総修復件数:   ${{ needs.error-detection-fix-loop.outputs.total_fixes }}"
          echo "   最終ステータス: ${{ needs.error-detection-fix-loop.outputs.final_status }}"
          echo ""

          STATUS="${{ needs.error-detection-fix-loop.outputs.final_status }}"
          case "$STATUS" in
            "clean")
              echo "✅ 結果: 全エラー解消 - システムは正常な状態です"
              ;;
            "auto_fixed")
              echo "🔧 結果: 自動修復完了 - 一部手動対応を推奨します"
              ;;
            "needs_manual_fix")
              echo "⚠️ 結果: 手動対応が必要 - CI ログを確認してください"
              ;;
            *)
              echo "ℹ️ 結果: 実行完了"
              ;;
          esac

          echo ""
          echo "🔗 詳細ログ: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "============================================="

