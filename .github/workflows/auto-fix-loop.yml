# ============================================================
#
# セキュリティ考慮事項:
#   - 自動修復はコードフォーマット・パーミッション等の安全な変更のみ
#   - セキュリティ問題・テスト失敗・複雑度は手動対応必須
#   - sudo/root 権限変更は自動修復の対象外
#   - 全変更は git commit で証跡を残す
#
# 暴走防止機構:
#   - 最大15回のループ制限
#   - 修復件数が0の場合はループ終了
