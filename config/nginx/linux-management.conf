# ==============================================================================
# Linux Management System - Nginx リバースプロキシ設定（Production HTTPS）
#
# 設置先: /etc/nginx/sites-available/linux-management
# 有効化: sudo ln -s /etc/nginx/sites-available/linux-management \
#                     /etc/nginx/sites-enabled/linux-management
# 確認:   sudo nginx -t
# 反映:   sudo systemctl reload nginx
#
# バックエンド: http://127.0.0.1:8000 (gunicorn + FastAPI, 2 workers)
#
# SSL 証明書:
#   /etc/ssl/certs/linux-management.crt
#   /etc/ssl/private/linux-management.key
#   → 生成手順: config/ssl/README.md 参照
#
# レート制限ゾーン（nginx.conf の http{} ブロックに追加が必要）:
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
#   → config/nginx/nginx-main-snippets.conf 参照
# ==============================================================================

# ==============================================================================
# HTTP → HTTPS 301 リダイレクト
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME チャレンジ（Let's Encrypt 自動更新用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # その他すべての HTTP リクエストを HTTPS に恒久リダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# HTTPS メインサーバー（本番）
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ------------------------------------------------------------------
    # TLS 設定
    # ------------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/linux-management.crt;
    ssl_certificate_key /etc/ssl/private/linux-management.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling（公的証明書使用時にコメント解除）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # DH パラメーター（オプション、Forward Secrecy 強化）
    # ssl_dhparam /etc/ssl/certs/dhparam.pem;
    # 生成: openssl dhparam -out /etc/ssl/certs/dhparam.pem 2048

    # ------------------------------------------------------------------
    # セキュリティヘッダー
    # ------------------------------------------------------------------

    # HSTS: 1 年間 HTTPS を強制（初回設定後は短い値でテスト推奨）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # クリックジャッキング対策
    add_header X-Frame-Options "DENY" always;

    # MIME タイプスニッフィング防止
    add_header X-Content-Type-Options "nosniff" always;

    # XSS フィルタ（レガシーブラウザ向け）
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer ポリシー
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy（管理 UI 用設定）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'none';" always;

    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # プロキシ経由であることを隠す
    add_header X-Powered-By "" always;

    # ------------------------------------------------------------------
    # ログ設定
    # ------------------------------------------------------------------
    access_log /var/log/nginx/linux-management-access.log;
    error_log  /var/log/nginx/linux-management-error.log warn;

    # ------------------------------------------------------------------
    # クライアント設定
    # ------------------------------------------------------------------
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 10s;
    keepalive_timeout    65s;

    # ------------------------------------------------------------------
    # Gzip 圧縮（nginx.conf の gzip 設定と併用）
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ------------------------------------------------------------------
    # フロントエンド静的ファイル
    # ------------------------------------------------------------------
    root  /opt/linux-management/frontend;
    index index.html;

    # CSS / JS / 画像: 長期キャッシュ
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /opt/linux-management/frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # フロントエンド HTML ページ（MPA 構成）
    location ~ ^/(index|login|dashboard|processes|network|servers|hardware|users|cron|approval)\.html$ {
        root /opt/linux-management/frontend;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ------------------------------------------------------------------
    # WebSocket プロキシ（/ws/* パス）
    # ------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket ハンドシェイク必須ヘッダー
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # WebSocket は長時間接続のためタイムアウトを延長
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }

    # ------------------------------------------------------------------
    # ログイン API: レート制限（ブルートフォース対策）
    # ------------------------------------------------------------------
    location = /api/auth/login {
        # limit_req_zone は nginx-main-snippets.conf で定義
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    # ------------------------------------------------------------------
    # API プロキシ（FastAPI バックエンド: 8000）
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        # 承認操作など長時間処理に対応
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        proxy_intercept_errors off;
    }

    # OpenAPI ドキュメント（本番では社内 IP のみ許可することを推奨）
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 本番: 外部アクセスを制限する場合はコメント解除
        # allow 192.168.0.0/16;
        # allow 10.0.0.0/8;
        # deny  all;
    }

    # ------------------------------------------------------------------
    # ルート → ログイン画面
    # ------------------------------------------------------------------
    location = / {
        return 302 /login.html;
    }

    # ------------------------------------------------------------------
    # セキュリティ: 隠しファイル・バックアップファイルへのアクセス拒否
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
    }
}
