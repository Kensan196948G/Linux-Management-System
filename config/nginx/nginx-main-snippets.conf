# ==============================================================================
# Linux Management System - nginx.conf スニペット
#
# このファイルの内容は /etc/nginx/nginx.conf の http{} ブロックに
# 追加（またはインクルード）してください。
#
# 適用方法（オプション A: 直接貼り付け）:
#   sudo nano /etc/nginx/nginx.conf
#   # http { ... } の中に以下の設定を追加
#
# 適用方法（オプション B: インクルード）:
#   sudo cp config/nginx/nginx-main-snippets.conf /etc/nginx/conf.d/linux-management-main.conf
#   # /etc/nginx/nginx.conf の http{} に以下があることを確認:
#   #   include /etc/nginx/conf.d/*.conf;
#
# 確認: sudo nginx -t
# 反映: sudo systemctl reload nginx
# ==============================================================================

# ==============================================================================
# ワーカープロセス設定
# （nginx.conf のトップレベルに配置 - http{} の外）
# ==============================================================================
# worker_processes auto;
# worker_rlimit_nofile 65535;
#
# events {
#     worker_connections 1024;
#     multi_accept on;
#     use epoll;
# }


# ==============================================================================
# http{} ブロック内に追加する設定
# ==============================================================================

# ------------------------------------------------------------------------------
# レート制限ゾーン定義
# ------------------------------------------------------------------------------

# ログイン API: クライアント IP ごとに 5 リクエスト/分
# burst=3: 瞬間的な超過を 3 件まで許容
# 使用先: config/nginx/linux-management.conf の /api/auth/login ブロック
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# API 全体: クライアント IP ごとに 60 リクエスト/秒
# 使用先: 必要に応じて /api/ ブロックに limit_req zone=api_limit; を追加
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

# レート制限超過時のログレベル（warn に落として error ログを汚さない）
limit_req_log_level warn;


# ------------------------------------------------------------------------------
# Gzip 圧縮設定
# ------------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# すでに圧縮されたコンテンツは再圧縮しない
gzip_disable "msie6";


# ------------------------------------------------------------------------------
# 接続・バッファ設定
# ------------------------------------------------------------------------------
sendfile           on;
tcp_nopush         on;
tcp_nodelay        on;
keepalive_timeout  65;
types_hash_max_size 2048;

# クライアントボディバッファ（大きなフォーム送信用）
client_body_buffer_size  128k;
client_max_body_size     10m;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# プロキシバッファ（上流レスポンスのバッファリング）
proxy_buffer_size   16k;
proxy_buffers       8 16k;
proxy_busy_buffers_size 32k;


# ------------------------------------------------------------------------------
# タイムアウト設定
# ------------------------------------------------------------------------------
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;  # サイト設定側で上書き可能


# ------------------------------------------------------------------------------
# セキュリティ: サーバー情報の隠蔽
# ------------------------------------------------------------------------------
server_tokens off;


# ------------------------------------------------------------------------------
# ログフォーマット（詳細版）
# ------------------------------------------------------------------------------
log_format linux_management_combined
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time uct="$upstream_connect_time" '
    'uht="$upstream_header_time" urt="$upstream_response_time"';

# アクセスログに上記フォーマットを適用する場合:
# access_log /var/log/nginx/linux-management-access.log linux_management_combined;


# ------------------------------------------------------------------------------
# オープンファイルキャッシュ（静的ファイル配信最適化）
# ------------------------------------------------------------------------------
open_file_cache          max=1000 inactive=20s;
open_file_cache_valid    30s;
open_file_cache_min_uses 2;
open_file_cache_errors   on;
