# ==============================================================================
# Linux Management System - Nginx リバースプロキシ設定（Development）
#
# 設置先: /etc/nginx/sites-available/linux-management-dev
# 有効化: sudo ln -s /etc/nginx/sites-available/linux-management-dev \
#                     /etc/nginx/sites-enabled/linux-management-dev
# 確認:   sudo nginx -t
# 反映:   sudo systemctl reload nginx
#
# バックエンド: http://127.0.0.1:5012 (uvicorn, 1 worker, --reload)
#
# 構成:
#   クライアント → nginx:5013 → uvicorn:5012
#
# 用途:
#   - HTTPS なしの開発環境で nginx 経由の動作確認
#   - ログ・ヘッダー注入のテスト
#   - 本番設定の事前検証
#
# ⚠️  本設定は開発環境専用です。本番環境には使用しないでください。
# ==============================================================================

server {
    listen 5013;
    listen [::]:5013;
    server_name localhost 127.0.0.1;

    # ------------------------------------------------------------------
    # ログ設定（開発用: デバッグレベル）
    # ------------------------------------------------------------------
    access_log /var/log/nginx/linux-management-dev-access.log;
    error_log  /var/log/nginx/linux-management-dev-error.log debug;

    # ------------------------------------------------------------------
    # クライアント設定
    # ------------------------------------------------------------------
    client_max_body_size 10m;
    client_body_timeout  60s;
    keepalive_timeout    65s;

    # ------------------------------------------------------------------
    # WebSocket プロキシ（/ws/* パス）
    # ------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:5012;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }

    # ------------------------------------------------------------------
    # API プロキシ（FastAPI バックエンド: 5012）
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:5012;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;

        proxy_intercept_errors off;

        # 開発環境: CORS ヘッダーを付与（必要に応じて）
        # add_header Access-Control-Allow-Origin  "http://localhost:5012" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # OpenAPI ドキュメント（開発環境では全許可）
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:5012;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # フロントエンド静的ファイル（開発用: ソースから直接配信）
    # ------------------------------------------------------------------
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /opt/linux-management/frontend;
        try_files $uri @backend;
        access_log off;
        # 開発環境ではキャッシュ無効
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # HTML ページ
    location ~ ^/(index|login|dashboard|processes|network|servers|hardware|users|cron|approval)\.html$ {
        root /opt/linux-management/frontend;
        try_files $uri @backend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # フォールバック: バックエンドへプロキシ
    location @backend {
        proxy_pass http://127.0.0.1:5012;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ルート → ログイン画面
    location = / {
        return 302 /login.html;
    }

    # ------------------------------------------------------------------
    # セキュリティ: 隠しファイルへのアクセス拒否
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
